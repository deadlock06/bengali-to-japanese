য; দ্রুত কথায় কান লাগবে। した = অতীত, す = এখন/পরে — এই ছোট্ট anchor মনে রাখো।"},{"t":"h","c":"⚠️ ভুল যেখানে হয়"},{"t":"p","c":"1. Weekend প্রশ্নের উত্তরে one-word: かいもの। — চলে, কিন্তু বন্ধুত্ব হয় না। Formula: [কার সাথে]と [কোথায]で [কী]を しました。 এক বাক্য = দশগুণ আন্তরিক। 2. べんきょうします**した** ×— しました。 します এর অতীত পুরোটাই বদলায়। 3. ね আর よ অদল: নতুন তথ্যে ね বললে জাপানি ভাববে \"ও জানল কীভাবে?\" 😄"},{"t":"h","c":"🏮 Culture corner"},{"t":"p","c":"জাপানে আবহাওয়া নিয়ে কথা মানে \"আমি তোমার সাথে ভাব রাখতে চাই\" — content শূন্য, intent একশো। সকালে সহকর্মীকে きょうは さむいですね বলাটা আসলে বলা: \"আমরা ঠিক আছি তো?\" উত্তরও beautifully সহজ: そうですね! (তাই তো!)। এই দুই বাক্যের exchange জাপানি সমাজের social glue।"},{"t":"h","c":"✍️ অনুশীলন"},{"t":"p","c":"**A:** অতীতে নাও: たべます・みます・かいます・します・べんきょうします **B:** সত্যি করে বলো: গত weekend এ কী করলে? (৩ বাক্য — কার সাথে, কোথায়, কী) **C:** আগামী ছুটির plan ২ বাক্য + সহকর্মীকে দাওয়াত দাও ১ বাক্যে। *(উত্তর: Appendix J)*"},{"t":"h","c":"📦 SRS words"},{"t":"p","c":"きのう・きょう・あした・せんしゅう・らいしゅう・しゅうまつ・〜ました・〜ませんでした・ね・よ・あつい・さむい・しゅみ・かいもの・えいが・ともだち・こうえん・〜かったです"},{"t":"h","c":"☑️ Self-check"},{"t":"li","c":"[ ] গতকালের কথা ৩ বাক্যে বলতে পারি"},{"t":"li","c":"[ ] ね/よ ঠিক জায়গায় বসে মুখে"},{"t":"li","c":"[ ] Small talk শুরু ও চালিয়ে নিতে পারি"}]},{"id":"ch13","num":13,"title":"সমস্যা, ক্ষমা আর safety","part":"PART 2 — Daily Life ও কাজের জাপানি (A2)","blocks":[{"t":"p","c":"`unit: A2.6 · level: A2 · আগে লাগবে: Ch.8 · app lessons: lesson_work_safety, lesson_emergency (অংশ)`"},{"t":"h","c":"🎯 এই chapter শেষে"},{"t":"li","c":"কাজে ভুল/সমস্যা report করতে পারবে (লুকানো ছাড়া — 報連相 মনে আছে?)"},{"t":"li","c":"ঠিকভাবে ক্ষমা চাইতে পারবে — জাপানি ক্ষমার layer গুলো সহ"},{"t":"li","c":"Safety instruction গুলো শুনে/পড়ে বুঝবে — এটা জীবন-মরণের ব্যাপার, আক্ষরিক অর্থে"},{"t":"h","c":"🎬 Scene"},{"t":"p","c":"মেশিনে একটা part উল্টো লাগিয়ে ফেলেছ। কেউ দেখেনি। বাংলাদেশি instinct: চুপচাপ ঠিক করে ফেলি। জাপানি নিয়ম: **এক্ষুনি report।** কারণ জাপানি factory তে \"ছোট ভুল লুকানো\" = বিশ্বাস ভাঙা, আর \"ভুল report করা\" = দায়িত্বশীলতা। উল্টো জগৎ, কিন্তু এটাই ওদের system — আর honestly, এটাই নিরাপদ।"},{"t":"h","c":"📖 শব্দ (app verified — safety পুরো set)"},{"t":"table","rows":[["জাপানি","Romaji","বাংলা"],["あぶないです","abunai desu","বিপদ! / বিপজ্জনক"],["きをつけてください","ki o tsukete kudasai","সাবধান থাকুন"],["ヘルメットをかぶってください","herumetto o kabutte kudasai","হেলমেট পরুন"],["てぶくろをしてください","tebukuro o shite kudasai","হাতমোজা পরুন"],["ここにはいらないでください","koko ni hairanaide kudasai","এখানে ঢুকবেন না"],["きかいをとめてください","kikai o tomete kudasai","মেশিন বন্ধ করুন"],["けがをしました","kega o shimashita","আঘাত পেয়েছি"],["だいじょうぶですか","daijoubu desu ka","ঠিক আছেন?"],["まちがえました","machigaemashita","ভুল করে ফেলেছি ★"],["もうしわけありません","moushiwake arimasen","গভীরভাবে দুঃখিত ★★"],["こわれました","kowaremashita","ভেঙে গেছে"],["おとしました","otoshimashita","ফেলে দিয়েছি"],["わすれました","wasuremashita","ভুলে গেছি"],["きんし","kinshi","নিষেধ (sign এ: 立入禁止 = ঢোকা নিষেধ)"]]},{"t":"h","c":"🧩 Grammar core"},{"t":"p","c":"**১. ক্ষমার সিঁড়ি — কোনটা কখন:**"},{"t":"table","rows":[["স্তর","কথা","কখন"],["হালকা","すみません","ধাক্কা লাগল, দেরি ২ মিনিট"],["মাঝারি","ごめんなさい","বন্ধু-মহলে, ব্যক্তিগত ভুল"],["গুরুতর","もうしわけありません","কাজের ভুল, boss/customer এর কাছে ★"],["খুব গুরুতর","もうしわけありませんでした + গভীর bow","ক্ষতি হয়ে গেছে এমন ভুল"]]},{"t":"p","c":"**২. ভুল report করার golden formula (মুখস্থ — এটা তোমাকে বাঁচাবে):**"},{"t":"q","c":"すみません。[কী হয়েছে]。もうしわけありません。"},{"t":"q","c":"すみません。ぶひんを まちがえました。もうしわけありません。 *(দুঃখিত। Part টা ভুল করেছি। ক্ষমা চাইছি।)*"},{"t":"p","c":"তারপর জাপানি supervisor ৯৯% যেটা বলবে: わかりました。つぎから きをつけてください。 (ঠিক আছে। এরপর সাবধান।) — ব্যস, শেষ। দেখেছ? report করলে গল্পটা এখানেই থামে।"},{"t":"p","c":"**৩. 〜てしまいました — \"ইশ, হয়ে গেছে\" (N4 এর জিনিস, but দরকারি তাই preview):**"},{"t":"q","c":"おとして**しまいました**。 — ফেলে ফেলেছি (অনিচ্ছায়)। আফসোসের রঙটা grammarেই আছে। এখন chunk হিসেবে নাও।"},{"t":"p","c":"**৪. Sign-পড়া grammar: 禁止 দেখলেই \"নিষেধ\":** 立入禁止 (ঢোকা) · 撮影禁止 (ছবি তোলা) · 飲食禁止 (খাওয়া)। কানজি না পড়তে পারলেও 禁止 জোড়াটা চিনে রাখো — লাল রঙে থাকবে।"},{"t":"h","c":"💬 Dialogue — ভুলের পরের ৩০ সেকেন্ড"},{"t":"q","c":"**তুমি:** リーダー、すみません。"},{"t":"q","c":"**リーダー:** はい?"},{"t":"q","c":"**তুমি:** ネジを おとして しまいました。きかいの したに あります。 *(স্ক্রু ফেলে ফেলেছি। মেশিনের নিচে।)*"},{"t":"q","c":"**リーダー:** わかりました。きかいを とめます。…はい、とりました。"},{"t":"q","c":"**তুমি:** もうしわけありません。"},{"t":"q","c":"**リーダー:** だいじょうぶ。ほうこく、ありがとう。 *(ঠিক আছে। Report করার জন্য ধন্যবাদ।)*"},{"t":"p","c":"শেষ লাইনটা খেয়াল করো — জাপানি supervisor ভুলের জন্য না, **report এর জন্য ধন্যবাদ** দিল। এটাই culture টা।"},{"t":"h","c":"🗣️ উচ্চারণ trap"},{"t":"li","c":"もうしわけありません — লম্বা も**う**, তারপর একটানে: \"মোːশিওয়াকে আরিমাসেন\"। থেমে থেমে বললে খেলো শোনায় — এক নিঃশ্বাসে বলার practice করো, কারণ যেদিন লাগবে সেদিন মাথা কাজ করবে না, মুখস্থ মুখই কাজ করবে।"},{"t":"li","c":"あぶない! — বিপদের ডাক, জোরে-স্পষ্ট: \"আবুনাই!\" কেউ তোমাকে বললে **আগে সরো, পরে ভাবো।**"},{"t":"h","c":"⚠️ ভুল যেখানে হয়"},{"t":"p","c":"1. ভুলের পরে excuse আগে দেওয়া (でも… \"কিন্তু…\") — জাপানে ক্ষমা **আগে**, ব্যাখ্যা পরে (চাইলে)। উল্টালে insincere শোনায়। 2. ごめんなさい boss কে — বন্ধু-শব্দ ওটা। কাজে もうしわけありません। 3. だいじょうぶですか শুনে নিজের ব্যথা লুকানো — けがをしました বলো। জাপানি আইনে কাজের আঘাত (労災 rousai) এর চিকিৎসা company র দায়িত্ব — লুকালে নিজের ক্ষতি।"},{"t":"h","c":"🏮 Culture corner"},{"t":"p","c":"জাপানি ক্ষমা মানে \"আমি অপরাধী\" না — মানে \"সম্পর্কটা আমার কাছে জরুরি\"। তাই জাপানিরা দিনে বিশবার ক্ষমা চায় এবং কেউ ছোট হয়ে যায় না। ক্ষমা চাওয়াকে হার ভেবো না — ওদের চোখে ওটা শক্তি। আর নিজে ক্ষমা পেলে বলো: いいえ、だいじょうぶです — সমান মাপের উদারতা।"},{"t":"h","c":"✍️ অনুশীলন"},{"t":"p","c":"**A:** কোন ক্ষমা কোথায়? — (১) ট্রেনে পা মাড়ালে (২) customer এর অর্ডার ভুল (৩) বন্ধুর বই আনতে ভুলেছ **B:** Report drill: (১) গ্লাস ভেঙেছ (২) চাবি হারিয়েছ (৩) ভুল বাক্সে মাল রেখেছ — তিনটাই full formula য়। **C:** Safety শোনা-পরীক্ষা: きかいを とめてください!/ そこに はいらないで! — শুনেই কী করবে? *(উত্তর: Appendix J)*"},{"t":"h","c":"📦 SRS words"},{"t":"p","c":"あぶない・きをつけて・ヘルメット・てぶくろ・はいらないでください・とめてください・けが・まちがえました・もうしわけありません・こわれました・おとしました・わすれました・きんし・〜てしまいました・ほうこく"},{"t":"h","c":"☑️ Self-check"},{"t":"li","c":"[ ] ভুল report এর formula ঘুমেও বলতে পারি"},{"t":"li","c":"[ ] ক্ষমার ৩ স্তর জানি — কোনটা কাকে"},{"t":"li","c":"[ ] 禁止 sign দেখলে চিনি"}]},{"id":"ch14","num":14,"title":"JFT-Basic Exam Guide","part":"PART 2 — Daily Life ও কাজের জাপানি (A2)","blocks":[{"t":"p","c":"`unit: A2.M · level: A2 · আগে লাগবে: Ch.8–13 সব · app: AiCheckScreen mock (T-planned)`"},{"t":"h","c":"🎯 এই chapter শেষে"},{"t":"li","c":"Exam এর পুরো format, scoring, registration জানবে"},{"t":"li","c":"চার section এর প্রতিটার strategy পাবে"},{"t":"li","c":"একটা realistic ৮-সপ্তাহের revision plan"},{"t":"h","c":"📖 Exam টা আসলে কী"},{"t":"p","c":"**JFT-Basic (Japan Foundation Test for Basic Japanese)** — SSW (特定技能) work visa র ভাষা-প্রমাণ। Computer-Based Test (CBT) — কাগজ নেই, screen এ। বাংলাদেশসহ এশিয়ার অনেক দেশে center আছে; প্রায় সারা বছরই slot পাওয়া যায় (JLPT র মতো বছরে মাত্র দুইবার না — এটা বিশাল সুবিধা)।"},{"t":"table","rows":[["বিষয়","তথ্য"],["সময়","৬০ মিনিট"],["প্রশ্ন","~৫০টা (৪ section, প্রতিটায় ~১২)"],["Score","১০–২৫০ point scale"],["Pass (SSW র জন্য)","**২০০+**"],["Format","সব multiple choice, screen এ; listening এ headphone"],["ভাষা-সাহায্য","নির্দেশনা বাংলাসহ কয়েকটা ভাষায় পাওয়া যায়"]]},{"t":"p","c":"**⚡ ২০২৬ আগস্ট থেকে নতুন নিয়ম:** score band দিয়ে level ও জানাবে — ১৪৫–১৭৪ = A1, ১৭৫–১৯৯ = A2.1, ২০০–২৫০ = A2.2 (এটাই pass)। মানে ২০০ না পেলেও certificate এ দেখা যাবে কোথায় আছ — পরের চেষ্টার মাপকাঠি পরিষ্কার।"},{"t":"h","c":"📖 চার section, চার কৌশল"},{"t":"p","c":"**১. 文字と語彙 (Script & Vocabulary):** হিরাগানা-কাতাকানা পড়া + শব্দের অর্থ + ছবি-শব্দ মিল। *কৌশল:* Ch.1–2 এর লিপি যেন automatic হয় — এখানে সময় বাঁচিয়ে পরের section এ খরচ করবে। কাতাকানা especially — বিদেশি শব্দ পড়ানো ওদের প্রিয় প্রশ্ন।"},{"t":"p","c":"**২. 会話と表現 (Conversation & Expression):** ছোট্ট situation + \"এখানে কী বলবে?\" — ৪ option। *কৌশল:* এই বইয়ের প্রতিটা 💬 dialogue আর ⚠️ section আসলে এই section এরই preparation ছিল। Situation পড়ে ভাবো: ভদ্রতার স্তর কী? (boss নাকি বন্ধু?) — অর্ধেক option সেখানেই বাদ।"},{"t":"p","c":"**৩. 聴解 (Listening):** কথোপকথন/ঘোষণা শুনে প্রশ্নের উত্তর। *কৌশল:* প্রশ্নটা **আগে** পড়ো (screen এ থাকে), তারপর শোনো — কী খুঁজছ জেনে শুনলে ৩ গুণ সহজ। Station announcement, দোকানের কথা, কাজের নির্দেশ — এই তিন জগতের audio বেশি। App এর listening drill গুলোই এই ফরম্যাটে বানানো।"},{"t":"p","c":"**৪. 読解 (Reading):** Notice, menu, SMS, schedule পড়ে বোঝা। *কৌশল:* পুরোটা পড়ার দরকার প্রায় কখনোই নেই — প্রশ্ন যা চায় (সময়? দাম? কোন দিন?) সেটা খোঁজো। 禁止・注意・休み — এই sign-words গুলো চেনা থাকলেই অনেক প্রশ্ন free marks।"},{"t":"h","c":"📖 ৮-সপ্তাহ revision plan (দিনে ৩০–৪৫ min)"},{"t":"table","rows":[["সপ্তাহ","ফোকাস"],["১–২","Ch.1–3 লিপি speed-run: কানা flash card + সংখ্যা শোনা। App এর SRS due শূন্যে রাখো"],["৩–৪","Ch.4–7 dialogue গুলো shadowing (শুনে সাথে সাথে বলা) — দিনে ২টা"],["৫–৬","Ch.8–13 আবার + প্রতি chapter এর ⚠️ ভুলগুলো নিজে নিজে test"],["৭","Mock test মোড: app এর AI-check + sample questions, সময় ধরে"],["৮","শুধু দুর্বল জায়গা (app এর \"focus next\" list) + ঘুম ঠিক করো"]]},{"t":"p","c":"শেষ কথাটা মজা না — listening score ঘুমের সাথে সরাসরি ওঠানামা করে। পরীক্ষার আগের রাতে নতুন কিছু শিখতে যেও না।"},{"t":"h","c":"📖 পরীক্ষার দিন"},{"t":"li","c":"জাতীয় পরিচয়পত্র/passport নিতে ভুলো না (registration এর সাথে যেন মেলে)"},{"t":"li","c":"Center এ ৩০ min আগে; tutorial screen টা তাড়াহুড়ায় skip কোরো না — button গুলো চিনে নাও"},{"t":"li","c":"একটা প্রশ্নে আটকে গেলে দাগ দিয়ে (flag) এগিয়ে যাও — ৬০ মিনিটে ৫০টা মানে প্রশ্নপ্রতি ~৭০ সেকেন্ড"},{"t":"li","c":"না জানলেও **guess করো** — ভুলে negative marking নেই"},{"t":"h","c":"☑️ Ready কিনা বুঝবে যেভাবে"},{"t":"li","c":"[ ] Ch.4–13 এর সব ☑️ self-check টিক পড়েছে"},{"t":"li","c":"[ ] App এর mock এ ধারাবাহিক ৭৫%+"},{"t":"li","c":"[ ] যেকোনো dialogue শুনে মূল কথা ধরতে পারো প্রথমবারেই"},{"t":"p","c":"এই তিনটা মিললে — যাও, exam টা তোমার। না মিললে আরও এক মাস — লজ্জার কিছু না, exam পালাচ্ছে না; প্রায় প্রতি মাসেই session আছে।"},{"t":"h","c":"ভাষাটা এবার তোমার হাতে খুলে যাবে"},{"t":"p","c":"A2 পর্যন্ত তুমি শিখেছ **বাক্য ব্যবহার করতে**। N4 এ শিখবে **বাক্য বানাতে** — verb এর ইঞ্জিন খুলে দেখা। এই part শেষে তুমি আর \"মুখস্থ phrase\" এর মানুষ না — তুমি জাপানি ভাষার চালক। JLPT N4 = ~১,৫০০ শব্দ + ~৩০০ কানজি + এই ৬ chapter এর grammar। Care, food, hospitality sector এ N4 certificate মানে বেতন আর সম্মান দুটোই এক ধাপ উপরে।"}]},{"id":"ch15","num":15,"title":"て-form: জাপানি grammar এর সুইস আর্মি নাইফ","part":"PART 3 — Grammar Expansion (JLPT N4)","blocks":[{"t":"p","c":"`unit: N4.1 · level: N4 · আগে লাগবে: Ch.12 · app lesson: (authoring pending)`"},{"t":"h","c":"🎯 এই chapter শেষে"},{"t":"li","c":"যেকোনো verb এর て-form বানাতে পারবে (এতদিনের chunk গুলোর রহস্য ভেদ!)"},{"t":"li","c":"কাজ জোড়া দিতে পারবে: \"উঠে, নাস্তা খেয়ে, কাজে গেলাম\""},{"t":"li","c":"〜ています (চলমান কাজ) বলতে পারবে"},{"t":"h","c":"🎬 Scene"},{"t":"p","c":"মনে আছে Ch.11 তে বলেছিলাম — いって, まって, みせて গুলো \"পরে খুলব\"? আজ সেই দিন। একবার এই form টা পেয়ে গেলে জাপানি grammar এর দরজাগুলো পরপর খুলতে থাকবে — অনুরোধ, অনুমতি, চলমান কাজ, কাজের ক্রম — সব এই এক form এর উপর দাঁড়িয়ে। এজন্যই একে বলা হয় জাপানি শেখার প্রথম \"boss level\"।"},{"t":"h","c":"🧩 Grammar core — নিয়মটা"},{"t":"p","c":"জাপানি verb তিন দল। ます-form থেকে চিনবে:"},{"t":"p","c":"**দল ২ (সবচেয়ে সোজা — る-verbs):** ます কেটে て।"},{"t":"q","c":"たべます → たべ**て** · みます → み**て** · おきます → おき**て**"},{"t":"p","c":"**দল ৩ (মাত্র দুটো, মুখস্থ):** します → して · きます → きて"},{"t":"p","c":"**দল ১ (う-verbs) — ます র আগের sound অনুযায়ী গান:**"},{"t":"table","rows":[["ます-র আগে","て-form","উদাহরণ"],["い・ち・り","**って**","かいます→かって (কিনে) · まちます→まって (অপেক্ষা করে) · かえります→かえって (ফিরে)"],["み・び・に","**んで**","のみます→のんで (খেয়ে/পান করে) · あそびます→あそんで (খেলে) · しにます→しんで"],["き","**いて**","かきます→かいて (লিখে) ★ব্যতিক্রম: いきます→いって"],["ぎ","**いで**","およぎます→およいで (সাঁতরে)"],["し","**して**","はなします→はなして (বলে)"]]},{"t":"p","c":"ভয়ের কিছু নেই — বাংলা মিলটা দেখো: **বাংলার \"-এ/য়ে\" রূপটাই て।** \"খেয়ে, গিয়ে, লিখে, ফিরে\" — আমরা তো এভাবেই কাজ জোড়া দিই! জাপানি ても exactly তাই। তোমার brain এ pattern টা already আছে, শুধু জাপানি sound গুলো বসাতে হবে।"},{"t":"p","c":"মুখস্থের গান (জাপানি বাচ্চারা যেটা দিয়ে শেখে): **って・って・って / んで・んで・んで / いて・いで・して** — い-ち-り って!み-び-に んで! সুর দিয়ে ১০ বার — বসে যাবে।"},{"t":"h","c":"🧩 て দিয়ে কী কী হয় (আজ ৩টা, পরে আরও)"},{"t":"p","c":"**১. কাজের ক্রম — বাংলার মতোই:**"},{"t":"q","c":"あさ おきて、シャワーを あびて、こうじょうに いきました。"},{"t":"q","c":"— সকালে **উঠে**, শাওয়ার **নিয়ে**, কারখানায় গেলাম।"},{"t":"p","c":"শেষ verb টাই tense বহন করে (ました) — আগেরগুলো সব て। বাংলাও তাই: \"উঠে, নিয়ে, **গেলাম**\" — শুধু শেষটায় অতীত!"},{"t":"p","c":"**২. 〜ています — এখন চলছে:**"},{"t":"q","c":"にほんごを べんきょう**しています**。 — জাপানি **শিখছি**। ★app verified phrase!"},{"t":"q","c":"あめが ふっています。 — বৃষ্টি পড়ছে।"},{"t":"p","c":"বাংলার \"-ছি/-ছে\" — present continuous। আরেক কাজ: অবস্থা বোঝানো — けっこんしています (বিবাহিত), とうきょうに すんでいます (টোকিওতে থাকি)।"},{"t":"p","c":"**৩. Ch.11 র রহস্যভেদ:** てください (করে দিন→করুন), てもいいですか (করলে ঠিক আছে?→করতে পারি?) — এখন নিজেই বানাতে পারো: つかいます→つかって→つかってもいいですか!"},{"t":"h","c":"💬 Dialogue — নিজের দিন বর্ণনা"},{"t":"q","c":"**せんぱい:** ラキブさん、まいにち なんじに おきますか。"},{"t":"q","c":"**তুমি:** ろくじに おきます。おきて、おいのりを して、あさごはんを たべて、しちじはんに でます。 *(৬টায় উঠি। উঠে, নামাজ পড়ে, নাস্তা খেয়ে, সাড়ে ৭টায় বেরোই।)*"},{"t":"q","c":"**せんぱい:** はやいですね!いま なにを していますか。"},{"t":"q","c":"**তুমি:** ぶひんを チェックしています。 *(Parts check করছি।)*"},{"t":"p","c":"おいのり = প্রার্থনা/নামাজ। জাপানি সহকর্মীরা প্রায়ই আগ্রহ নিয়ে জিজ্ঞেস করবে — লুকানোর কিছু নেই, おいのりを します বললে সবাই বুঝবে ও সম্মান করবে। কাজের ফাঁকে নামাজের জায়গা চাওয়ার বাক্য: おいのりを する ばしょは ありますか。"},{"t":"h","c":"🗣️ উচ্চারণ trap"},{"t":"li","c":"って র ছোট っ সবখানে স্পষ্ট: かって = \"কাত্তে\" (কাতে না — ওটা かて অন্য জিনিস)।"},{"t":"li","c":"のんで — ん + で আলাদা: \"নোন-দে\", \"নোদে\" না।"},{"t":"h","c":"⚠️ ভুল যেখানে হয়"},{"t":"p","c":"1. সব verb কে দল ২ ভাবা: ×かえて (かえります থেকে) — かえります দল ১, তাই かえって। চেনার hint: り-ます শেষ হলে প্রায় সবসময় দল ১। 2. いきます→×いきて — একমাত্র মহা-ব্যতিক্রম: いって। (আর はい, まちます→まって আর いきます→いって দুটোই って — context বলে দেবে কোনটা।) 3. তিনটার বেশি て জুড়ে ট্রেন বানানো — জাপানিরাও ২–৩টার বেশি জোড়ে না। বাক্য ভাঙো।"},{"t":"h","c":"🏮 Culture corner"},{"t":"p","c":"জাপানি কাজের নির্দেশ আসবেই て-form এ: これを もって、あそこに おいて、もどってきて。 (এটা নিয়ে, ওখানে রেখে, ফিরে এসো।) — て-form কানে বসে গেলে কাজের নির্দেশ শোনা হঠাৎ সহজ হয়ে যাবে। এই একটা grammar তোমার চাকরি-জীবনের listening এর অর্ধেক।"},{"t":"h","c":"✍️ অনুশীলন"},{"t":"p","c":"**A:** て-form বানাও: かきます・のみます・まちます・はなします・きます・します・いきます・あそびます **B:** নিজের সকালটা ৩-কাজ জুড়ে বলো (উঠে → ... → বেরোই)। **C:** এখন কী করছ? — ৩টা সত্যি বাক্য ています দিয়ে। *(উত্তর: Appendix J)*"},{"t":"h","c":"📦 SRS words"},{"t":"p","c":"て-form সব pattern cards (って/んで/いて/いで/して)・〜ています・おきます・シャワーをあびます・でます・すんでいます・けっこんしています・もって・おいて・もどって"},{"t":"h","c":"☑️ Self-check"},{"t":"li","c":"[ ] নতুন verb শুনে দল চিনে て-form বানাতে পারি"},{"t":"li","c":"[ ] ৩টা কাজ জুড়ে এক বাক্যে বলতে পারি"},{"t":"li","c":"[ ] \"এখন করছি\" আর \"প্রতিদিন করি\" আলাদা বলতে পারি"}]},{"id":"ch16","num":16,"title":"Plain form: বন্ধুর ভাষা","part":"PART 3 — Grammar Expansion (JLPT N4)","blocks":[{"t":"p","c":"`unit: N4.2 · level: N4 · আগে লাগবে: Ch.15 · app lesson: (authoring pending)`"},{"t":"h","c":"🎯 এই chapter শেষে"},{"t":"li","c":"Casual জাপানি বলতে/বুঝতে পারবে (だ・る・た র জগৎ)"},{"t":"li","c":"কখন polite, কখন casual — social radar টা তৈরি হবে"},{"t":"li","c":"Plain form দিয়ে বানানো বড় grammar গুলোর ভিত পাবে (と おもいます = মনে হয়)"},{"t":"h","c":"🎬 Scene"},{"t":"p","c":"Dorm এর বন্ধুরা LINE group এ লেখে: あした ひま? きょう なに たべる? — কোথায় です-ます? প্রথম মাসে শেখা polite জাপানির সাথে এ যেন অন্য ভাষা! আসলে এটাই আসল জাপানি — বন্ধুদের জাপানি। আর মজা: **তুমি এটা already জানো।** কীভাবে? পড়ো।"},{"t":"h","c":"🧩 Grammar core"},{"t":"p","c":"**১. রহস্য ফাঁস: dictionary form টাই plain form।** たべます এর আসল রূপ たべる। いきます এর আসল রূপ いく। ます হলো পোশাক — plain form হলো মানুষটা।"},{"t":"table","rows":[["Polite","Plain (present)","Plain (past)","Plain (neg.)"],["たべます","たべる","たべた","たべない"],["いきます","いく","いった","いかない"],["します","する","した","しない"],["きます","くる","きた","こない"],["です","だ","だった","じゃない"]]},{"t":"p","c":"**Past-plain এর shortcut:** て-form জানো তো? て→た, で→だ। かって→かった, のんで→のんだ। গত chapter এর কষ্ট এখানে সুদে-আসলে ফেরত!"},{"t":"p","c":"**২. বাংলার সাথে মিলটা এবার পুরো ছবিতে দেখো:**"},{"t":"table","rows":[["","বাংলা","জাপানি"],["Boss কে","\"খেয়েছেন?\"","たべましたか"],["বন্ধুকে","\"খাইছিস?/খেয়েছ?\"","たべた?"]]},{"t":"p","c":"তুমি সারাজীবন এই switch করেছ। জাপানি てও same খেলা — শুধু form গুলো নতুন। আপনি=です・ます, তুই/তুমি=plain। Social instinct টা import করো, form গুলো বসাও।"},{"t":"p","c":"**৩. Plain form কেন জরুরি (casual ছাড়াও):** বড় grammar গুলো plain form খায় —"},{"t":"q","c":"あした あめが ふる**と おもいます**。 — কাল বৃষ্টি হবে **মনে হয়**। (plain + とおもいます)"},{"t":"q","c":"にほんに いく**まえに**、べんきょうしました。 — জাপানে যাওয়ার **আগে** পড়েছি।"},{"t":"q","c":"ざんぎょうする**かもしれません**。 — Overtime করতে **হতে পারে**।"},{"t":"p","c":"মানে plain form শেখা = N4 এর বাকি অর্ধেক grammar এর টিকিট।"},{"t":"h","c":"💬 Dialogue — LINE group চ্যাট"},{"t":"q","c":"**ミン:** あした ひま? *(কাল ফ্রি?)*"},{"t":"q","c":"**তুমি:** ひまだよ。なんで? *(ফ্রি তো। কেন?)*"},{"t":"q","c":"**ミン:** イオンに いかない? セールが ある。 *(AEON যাবি না? sale চলছে।)*"},{"t":"q","c":"**তুমি:** いいね!なんじ?"},{"t":"q","c":"**ミン:** じゅうじは どう? *(১০টায় কেমন?)*"},{"t":"q","c":"**তুমি:** OK!じゃ、えきで まってる。 *(ok! station এ অপেক্ষায় থাকব।)*"},{"t":"p","c":"いかない? — negative দিয়ে দাওয়াত (\"যাবি না?\") — বাংলাতেও তো তাই বলি! まってる = まっている এর চাপা রূপ — কথ্য জাপানিতে い প্রায়ই হাওয়া।"},{"t":"h","c":"🗣️ উচ্চারণ trap"},{"t":"li","c":"Plain form এ বাক্য ছোট হয়ে যায় — তাই **intonation টাই ব্যাকরণ**: たべた。(খেয়েছি — নামা সুর) vs たべた?(খেয়েছিস? — ওঠা সুর)। か নেই, সুরই প্রশ্ন।"},{"t":"li","c":"ない negative এর শেষ い টা স্পষ্ট: いかない = \"ইকানাই\"।"},{"t":"h","c":"⚠️ ভুল যেখানে হয়"},{"t":"p","c":"1. **Boss/customer কে plain form** — বড় বেয়াদবি জাপানে। Rule of thumb: সন্দেহ হলে です・ます। Casual এ নামবে শুধু সে-ই আগে নামলে। 2. উল্টোটাও ভুল: বন্ধু বারবার casual বলছে আর তুমি です・ます — দেয়াল তুলে রাখার মতো লাগে। ওরা casual হলে তুমিও হও — এটা আন্তরিকতার দাওয়াত। 3. だ কে সবখানে বসানো: ×おいしいだ। い-adjective এ だ বসে না — おいしい (plain) already complete।"},{"t":"h","c":"🏮 Culture corner"},{"t":"p","c":"জাপানি সমাজের ভেতরের-বাইরের বৃত্ত (うち/そと) ভাষাতেই কোড করা। কেউ তোমার সাথে plain form এ নামা মানে — \"তুমি এখন আমার বৃত্তের ভেতরে।\" এটা উদযাপনের মুহূর্ত! আর তুমি নিজে কখন নামবে? সহজ সংকেত: সে নামলে, বয়সে-পদে সমান হলে, আর দুজনেই কাজের বাইরে। প্রথম নামার দিন একটু অস্বস্তি লাগবে — সবার লাগে — তারপর বন্ধুত্বটা আসল হয়ে যায়।"},{"t":"h","c":"✍️ অনুশীলন"},{"t":"p","c":"**A:** Plain এ নামাও: いきます・いきました・いきません・たべますか・きます **B:** এই polite বাক্যগুলো বন্ধু-ভাষায়: あした いきますか。→ ? · これは おいしいです。→ ? **C:** とおもいます লাগাও: (১) কাল গরম হবে-মনে হয় (২) সে আসবে না-মনে হয় *(উত্তর: Appendix J)*"},{"t":"h","c":"📦 SRS words"},{"t":"p","c":"plain form conversion cards (ます↔る পুরো set)・だ・じゃない・とおもいます・まえに・かもしれません・ひま・セール・どう?・いいね"},{"t":"h","c":"☑️ Self-check"},{"t":"li","c":"[ ] Polite ↔ plain দুই দিকেই বদলাতে পারি"},{"t":"li","c":"[ ] LINE এর casual জাপানি পড়ে বুঝি"},{"t":"li","c":"[ ] কার সাথে কোন form — radar কাজ করছে"}]},{"id":"ch17","num":17,"title":"Potential form: \"পারি\"","part":"PART 3 — Grammar Expansion (JLPT N4)","blocks":[{"t":"p","c":"`unit: N4.3 · level: N4 · আগে লাগবে: Ch.15 · app lesson: (authoring pending)`"},{"t":"h","c":"🎯 এই chapter শেষে"},{"t":"li","c":"\"X করতে পারি/পারি না\" বলতে পারবে — interview র ভাষা!"},{"t":"li","c":"できます র সব ব্যবহার"},{"t":"li","c":"Skill নিয়ে কথা বলা: CV, নতুন দায়িত্ব, side job"},{"t":"h","c":"🎬 Scene"},{"t":"p","c":"Supervisor নতুন মেশিনের সামনে দাঁড় করিয়ে জিজ্ঞেস করলেন: フォークリフト、うんてん できますか。 (Forklift চালাতে পারো?) — এই \"পারি/পারি না\" জগতটা এতদিন শুধু できます দিয়ে চালিয়েছ। আজ পুরো system।"},{"t":"h","c":"🧩 Grammar core"},{"t":"p","c":"**১. できます — সবচেয়ে সোজা রাস্তা (noun + が + できます):**"},{"t":"q","c":"にほんごが できます。 (জাপানি পারি) · うんてんが できます。 (ড্রাইভিং পারি) · りょうりが できます。 (রান্না পারি)"},{"t":"p","c":"**২. Verb এর নিজের potential form:** দল ২: る → られる: たべる → たべ**られる** (খেতে পারি) দল ৩: する → できる · くる → こられる দল ১: শেষ sound এর কলাম উঠে যায় え-তে + る:"},{"t":"q","c":"のむ → のめる (পান করতে পারি) · かく → かける (লিখতে পারি) · はなす → はなせる (বলতে পারি) · いく → いける (যেতে পারি)"},{"t":"p","c":"★ খেয়াল: potential এ object এর を প্রায়ই が হয়ে যায় — かんじ**が** よめます (কানজি পড়তে পারি)।"},{"t":"p","c":"**৩. Interview-power sentences (এগুলোই কাজে দেবে):**"},{"t":"q","c":"にほんごで でんわが できます。 — জাপানিতে ফোন ধরতে পারি।"},{"t":"q","c":"フォークリフトの めんきょが あります。うんてんできます。 — Forklift license আছে। চালাতে পারি।"},{"t":"q","c":"まだ かんじが あまり よめません。でも、べんきょうしています。 — এখনো কানজি তেমন পড়তে পারি না। কিন্তু শিখছি。"},{"t":"p","c":"শেষেরটা মুখস্থ করো — জাপানে \"পারি না + কিন্তু শিখছি\" হলো সবচেয়ে সম্মানিত উত্তর। মিথ্যে \"সব পারি\" র চেয়ে হাজার গুণ ভালো impression।"},{"t":"h","c":"💬 Dialogue — নতুন দায়িত্বের প্রস্তাব"},{"t":"q","c":"**かちょう:** ラキブさん、リフトの うんてんは できますか。"},{"t":"q","c":"**তুমি:** はい、できます。バングラデシュで さんねん うんてんしました。でも、にほんの めんきょは まだ ありません。 *(হ্যাঁ পারি। দেশে ৩ বছর চালিয়েছি। কিন্তু জাপানি license এখনো নেই।)*"},{"t":"q","c":"**かちょう:** じゃ、かいしゃで しけんを うけられますよ。 *(তাহলে company থেকেই পরীক্ষা দিতে পারবে।)*"},{"t":"q","c":"**তুমি:** ほんとうですか。ぜひ おねがいします! *(সত্যি? অবশ্যই, please!)*"},{"t":"p","c":"ぜひ = \"অবশ্যই/খুব করে চাই\" — সুযোগ লুফে নেওয়ার শব্দ। কেউ কিছু offer করলে ぜひ!বলা মানে দরজাটা নিজের দিকে টেনে নেওয়া।"},{"t":"h","c":"🗣️ উচ্চারণ trap"},{"t":"li","c":"られる এর ら-れ পরপর — \"রারেরু\" জড়িয়ে যায় মুখে। ধীরে: た-べ-ら-れ-る। কথ্য জাপানিতে অনেকে ら ফেলে বলে たべれる — শুনে চিনো, নিজে exam এ লেখো られる।"},{"t":"li","c":"できます vs できました — পারি vs পারলাম; শেষটুকু শোনো।"},{"t":"h","c":"⚠️ ভুল যেখানে হয়"},{"t":"p","c":"1. ×にほんごを できます — できます সবসময় **が** নেয়। 2. \"পারি না\" বলতে লজ্জায় はい বলে ফেলা — জাপানে ভুল \"পারি\" বলার পরিণাম অনেক খারাপ (কাজ এসে পড়বে!)। できません + でも べんきょうします — এটাই professional। 3. Potential আর passive এর চেহারা দল-২ তে এক (られる) — এখন ঘাবড়িও না, N4 এ context ই যথেষ্ট আলাদা করার জন্য।"},{"t":"h","c":"🏮 Culture corner"},{"t":"p","c":"জাপানি CV (履歴書 rirekisho) তে \"できること\" (যা পারি) লেখার আলাদা ঘর থাকে। বাড়িয়ে লেখা জাপানে চলে না — ওরা যাচাই করে এবং মনে রাখে। যা সত্যি পারো, নির্দিষ্ট করে লেখো: にほんご(JFT-Basic ごうかく)、フォークリフト(めんきょあり)、パソコン(Excel)। ছোট সত্যি list > বড় মিথ্যে list।"},{"t":"h","c":"✍️ অনুশীলন"},{"t":"p","c":"**A:** Potential বানাও: よむ・かく・はなす・たべる・くる・する **B:** নিজের সত্যিকারের ৩টা \"পারি\" আর ১টা \"পারি না কিন্তু শিখছি\" — জাপানিতে। **C:** ঐ dialogue টা নিজের skill (রান্না? সেলাই? bike?) দিয়ে re-play করো। *(উত্তর: Appendix J)*"},{"t":"h","c":"📦 SRS words"},{"t":"p","c":"できます・potential form cards (দল১/২/৩)・うんてん・めんきょ・しけんをうけます・ぜひ・まだ〜ません・でも・りょうり・パソコン"},{"t":"h","c":"☑️ Self-check"},{"t":"li","c":"[ ] যেকোনো verb কে \"পারি\" বানাতে পারি"},{"t":"li","c":"[ ] নিজের skill honestly বলতে পারি — পারা ও না-পারা দুটোই"},{"t":"li","c":"[ ] が/を switch টা মনে থাকে"}]},{"id":"ch18","num":18,"title":"দেওয়া-নেওয়া: あげる・もらう・くれる","part":"PART 3 — Grammar Expansion (JLPT N4)","blocks":[{"t":"p","c":"`unit: N4.4 · level: N4 · আগে লাগবে: Ch.16 · app lesson: (authoring pending)`"},{"t":"h","c":"🎯 এই chapter শেষে"},{"t":"li","c":"তিনটা \"দেওয়া-নেওয়া\" verb ঠিকঠাক বসাতে পারবে"},{"t":"li","c":"〜てくれる/〜てもらう দিয়ে \"করে দিল\" বলতে পারবে — কৃতজ্ঞতার grammar"},{"t":"li","c":"জাপানি gift-culture এর ভাষা"},{"t":"h","c":"🎬 Scene"},{"t":"p","c":"সেন্পাই তোমাকে পুরনো একটা সাইকেল দিলেন। এখন এটা কাউকে বলতে গেলে জাপানি ভাষা জানতে চাইবে: কে দিল, কাকে দিল, আর **তুমি ঘটনাটার কোন পাশে** — এই তিন প্রশ্নের উত্তর একসাথে এক verb এ। শুনতে জটিল, ধরলে সুন্দর।"},{"t":"h","c":"🧩 Grammar core"},{"t":"p","c":"**১. তিন verb, এক ছবি:**"},{"t":"table","rows":[["Verb","মানে","দিক"],["あげる","দিই/দেয়","আমি→অন্যকে, অন্যরা→অন্যকে"],["くれる","দেয় (আমাকে!)","অন্য কেউ→**আমার দিকে** ★"],["もらう","পাই/নিই","আমি←অন্যের থেকে"]]},{"t":"q","c":"わたしは ミンさんに ペンを **あげました**。 — মিনকে কলম দিলাম।"},{"t":"q","c":"せんぱいが じてんしゃを **くれました**。 — সেন্পাই (আমাকে) সাইকেল দিলেন।"},{"t":"q","c":"わたしは せんぱいに じてんしゃを **もらいました**。 — সেন্পাইয়ের থেকে সাইকেল পেলাম।"},{"t":"p","c":"মাঝের দুটো বাক্য same ঘটনা — camera র angle আলাদা। くれる এর বিশেষত্ব: **\"আমার দিকে\" আসা জিনিসের আলাদা verb** — বাংলায় নেই (আমরা \"দিল\" দিয়েই চালাই), তাই এটাই এ chapter এর আসল নতুন শেখা। ভাবো: くれる = \"দিয়ে দিল আমায়\" — দয়ার রঙ মাখানো \"দেওয়া\"।"},{"t":"p","c":"**২. আসল খেলা — て + এই তিন verb = কাজ করে দেওয়া:**"},{"t":"q","c":"せんぱいが てつだって**くれました**。 — সেন্পাই সাহায্য **করে দিলেন**। (আমার উপকার হলো — কৃতজ্ঞতা built-in!)"},{"t":"q","c":"ともだちに にほんごを おしえて**もらいました**。 — বন্ধুর কাছ থেকে জাপানি **শিখে নিলাম**।"},{"t":"q","c":"わたしが しゃしんを とって**あげます**よ。 — আমি ছবি **তুলে দিচ্ছি**।"},{"t":"p","c":"জাপানিরা উপকারের কথা কখনো plain verb এ বলে না — てくれた/てもらった বলবেই। এটা না বললে \"কৃতজ্ঞতাহীন\" শোনায়। বাংলায় ভাবো: \"সে আমাকে সাহায্য করল\" (তথ্য) vs \"সে সাহায্য **করে দিল**\" (উষ্ণতা) — জাপানি ভাষা দ্বিতীয়টা grammarে বাধ্যতামূলক করেছে।"},{"t":"h","c":"💬 Dialogue — সাইকেল-কাহিনি"},{"t":"q","c":"**ミン:** あたらしい じてんしゃ? *(নতুন সাইকেল?)*"},{"t":"q","c":"**তুমি:** ううん、せんぱいが くれた。ひっこしするから。 *(না রে, সেন্পাই দিয়েছে। উনি বাসা বদলাচ্ছেন তাই।)*"},{"t":"q","c":"**ミン:** いいなあ!やさしい せんぱいだね。"},{"t":"q","c":"**তুমি:** うん。だから きのう、そうじを てつだって あげた。 *(হুম। তাই কাল ওনার প্যাকিং-এ হাত লাগিয়ে দিলাম।)*"},{"t":"q","c":"**ミン:** おお、ラキブも やさしい!"},{"t":"p","c":"(পুরোটা plain form এ খেয়াল করেছ? Ch.16 কাজ করছে। から = কারণ/তাই — \"ひっこしする**から**\" = বাসা বদলাচ্ছে **বলে**।)"},{"t":"h","c":"🗣️ উচ্চারণ trap"},{"t":"li","c":"もらう→もらった — \"মোরাত্তা\" (ছোট っ)।"},{"t":"li","c":"あげる vs あける (খোলা) — げ/け একটাই পার্থক্য। দুই ফোঁটার (dakuten) কান তৈরি করো।"},{"t":"h","c":"⚠️ ভুল যেখানে হয়"},{"t":"p","c":"1. আমাকে-দেওয়ায় あげる: ×せんぱいが わたしに あげました — আমার দিকে এলে **くれました**। (あげる নিজের দিকে আসে না — মনে রাখার ছবি: あげる মানে হাত বাইরের দিকে।) 2. もらう এর particle: [দাতা]**に/から** もらう — দাতার গায়ে に (বা から), が না। 3. Boss কে してあげます বলা — \"করে দিচ্ছি আপনাকে\" যেন উপরওয়ালা ভঙ্গি; boss/customer এর জন্য します-ই ভদ্র (বা keigo — পরের chapter!)।"},{"t":"h","c":"🏮 Culture corner — おみやげ"},{"t":"p","c":"জাপানে কোথাও ঘুরতে গেলে সহকর্মীদের জন্য ছোট খাবার-স্যুভেনির (おみやげ) আনা প্রায় নিয়ম। দিতে গিয়ে বলো: これ、つまらないものですが… (এই যে, সামান্য জিনিস...) — জাপানি বিনয়-প্যাকেজিং। আর দেশ থেকে ফেরার সময় বাংলাদেশের চা/ঝালমুড়ি-type কিছু আনলে? Office এ তুমি star। ছোট্ট বাক্য: バングラデシュの おちゃです。どうぞ!"},{"t":"h","c":"✍️ অনুশীলন"},{"t":"p","c":"**A:** ঠিক verb বসাও: (১) মা আমাকে টাকা পাঠাল → おかあさんが おかねを おくって(  ) (২) আমি বন্ধুকে ছাতা দিলাম (৩) সেন্পাইয়ের থেকে বইটা পেলাম **B:** গত সপ্তাহে কে তোমার কী উপকার করল — ২টা てくれました বাক্য (সত্যি ঘটনা)। **C:** তুমি কার কী উপকার করলে — ১টা てあげました (বন্ধু-context এ)। *(উত্তর: Appendix J)*"},{"t":"h","c":"📦 SRS words"},{"t":"p","c":"あげます・くれます・もらいます・〜てくれます・〜てもらいます・〜てあげます・じてんしゃ・ひっこし・そうじ・おみやげ・つまらないものですが・から (কারণ)・おしえます・おくります"},{"t":"h","c":"☑️ Self-check"},{"t":"li","c":"[ ] তিন verb এর \"দিক\" ছবির মতো মাথায় আছে"},{"t":"li","c":"[ ] উপকার পেলে てくれました মুখে আসে"},{"t":"li","c":"[ ] おみやげ culture টা জানি"}]},{"id":"ch19","num":19,"title":"Keigo পরিচিতি: সম্মানের ভাষা","part":"PART 3 — Grammar Expansion (JLPT N4)","blocks":[{"t":"p","c":"`unit: N4.5 · level: N4 · আগে লাগবে: Ch.16 · app lesson: (authoring pending)`"},{"t":"h","c":"🎯 এই chapter শেষে"},{"t":"li","c":"Keigo র তিন শাখা চিনবে — কোনটা কী কাজ করে"},{"t":"li","c":"Service-জীবনের ready-made keigo set বলতে পারবে"},{"t":"li","c":"Customer/boss এর keigo **শুনে বুঝতে** পারবে (বলার আগে বোঝা!)"},{"t":"h","c":"🎬 Scene"},{"t":"p","c":"কনবিনির কাজ নিলে প্রথম দিনই শুনবে: いらっしゃいませ、レジぶくろは ごりようですか — manual এ লেখা এই ভাষা যেন এতদিনের জাপানির বড়ভাই। ভয় পেয়ো না: N4 level এ keigo মানে **চেনা আর ready-made set বলা** — নিজে বানানো N3-N2 র কাজ। সিঁড়ি একটা একটা করে।"},{"t":"h","c":"🧩 Grammar core"},{"t":"p","c":"**১. তিন শাখা — এক নজরে:**"},{"t":"table","rows":[["শাখা","কাজ","উদাহরণ"],["ていねいご (polite)","সাধারণ ভদ্রতা","です・ます — **এটা তো তুমি Ch.4 থেকেই পারো!**"],["そんけいご (honorific)","**অন্যের** কাজকে উঁচু করা","いらっしゃいます (আসেন/আছেন — সম্মানে)"],["けんじょうご (humble)","**নিজের** কাজকে নিচু করা","いたします (করি — বিনয়ে)"]]},{"t":"p","c":"ধরার সূত্র: **অন্যের কাজ = উঁচু শব্দ, নিজের কাজ = নিচু শব্দ।** বাংলায় আমরা বলি \"স্যার **এসেছেন**\" (সম্মান) but \"আমি **আসছি**\" — respect অন্যের দিকে। জাপানি এটাকে আলাদা শব্দ দিয়ে করে।"},{"t":"p","c":"**২. Big-five বদলি-শব্দ (এগুলো শুনলেই keigo ধরে ফেলবে):**"},{"t":"table","rows":[["সাধারণ","Honorific (ওনার কাজ)","Humble (আমার কাজ)"],["います (আছি)","いらっしゃいます","おります"],["いきます/きます","いらっしゃいます","まいります"],["たべます","めしあがります","いただきます ★চেনা শব্দ!"],["します","なさいます","いたします"],["いいます (বলি)","おっしゃいます","もうします ★"]]},{"t":"p","c":"★ もうします — মনে আছে Ch.13 র もうしわけありません? আর নিজের পরিচয়ের উঁচু ভার্সন: ラキブと **もうします** (আমি রাকিব বলছি — বিনয়ে) — interview তে わたしはラキブです এর premium উপগ্রেড। ★ いただきます — খাওয়ার আগের কথাটা আসলে humble \"গ্রহণ করছি\"! এতদিনে অর্থটা পুরো হলো।"},{"t":"p","c":"**৩. Service-set (কাজে লাগবেই — as-is মুখস্থ):**"},{"t":"q","c":"いらっしゃいませ! (আসুন! — customer ঢুকলে)"},{"t":"q","c":"しょうしょう おまちください。 (একটু অপেক্ষা করুন — ちょっとまって র keigo রূপ)"},{"t":"q","c":"かしこまりました。 (জি, বুঝেছি — わかりました র service ভার্সন)"},{"t":"q","c":"ありがとうございました。またおこしくださいませ。 (ধন্যবাদ। আবার আসবেন।)"},{"t":"h","c":"💬 Dialogue — কনবিনি counter এ তুমি এখন **ওপাশে**"},{"t":"q","c":"**おきゃくさま:** すみません、トイレは ありますか。"},{"t":"q","c":"**তুমি:** はい、ございます。あちらです。 *(আছে। ওই দিকে।)*"},{"t":"q","c":"**おきゃくさま:** あと、これ、あたためて もらえますか。"},{"t":"q","c":"**তুমি:** かしこまりました。しょうしょう おまちください。…おまたせしました。 *(জি। একটু অপেক্ষা করুন। ... অপেক্ষা করানোর জন্য দুঃখিত।)*"},{"t":"q","c":"**おきゃくさま:** ありがとう。"},{"t":"q","c":"**তুমি:** ありがとうございました!"},{"t":"p","c":"ございます = あります র keigo। おまたせしました — কাউকে এক সেকেন্ডও অপেক্ষা করালে বলার কথা; জাপানি service এর soul এক শব্দে।"},{"t":"h","c":"🗣️ উচ্চারণ trap"},{"t":"li","c":"いらっしゃいませ — \"ইরাসশাইমাসে\" এক ঢেউয়ে; っ+しゃ জোড়াটা drill করো। দোকানে ঢুকলেই শুনবে — free listening practice সারাদিন!"},{"t":"li","c":"かしこまりました — পাঁচ syllable এর ম্যারাথন: কা-শি-কো-মা-রি-মাশ্তা। ধীরে বললেও ঠিক আছে — স্পষ্টতা > গতি।"},{"t":"h","c":"⚠️ ভুল যেখানে হয়"},{"t":"p","c":"1. নিজের কাজে honorific: ×わたしが めしあがります — নিজের খাওয়া いただきます। (উঁচু শব্দ নিজের গায়ে দিলে জাপানি কানে হাস্যকর — নিজেকে নিজে স্যালুট করার মতো।) 2. Keigo র চাপে বেসিক ভুলে যাওয়া — মনে রাখো: **সঠিক です・ます সবসময় ভুল keigo র চেয়ে ভালো।** N4 এ কেউ তোমার কাছে perfect keigo আশা করে না। 3. বন্ধুকে かしこまりました বলা 😄 — service-set শুধু service এ।"},{"t":"h","c":"🏮 Culture corner"},{"t":"p","c":"Keigo জাপানিদের নিজেদেরও কঠিন লাগে — নতুন জাপানি কর্মীরাও কোম্পানিতে ঢুকে keigo-training পায়। তাই তোমার ভাঙা keigo নিয়ে কেউ হাসবে না; চেষ্টাটাই সম্মান পায়। আর secret টা হলো: keigo আসলে মুখস্থ-খেলা — situation গুলো repeat হয়, বাক্যও repeat হয়। কনবিনিতে এক সপ্তাহ কাজ করলে set টা এমনিই মুখে বসে যাবে।"},{"t":"h","c":"✍️ অনুশীলন"},{"t":"p","c":"**A:** কোন শাখা? — いたします・めしあがります・です・まいります・おっしゃいます **B:** Service-set drill: customer (১) ঢুকল (২) কিছু চাইল (৩) অপেক্ষা করল (৪) চলে যাচ্ছে — চারটা বাক্য পরপর। **C:** নিজের পরিচয় keigo তে: নাম + দেশ + よろしく — もうします ব্যবহার করে। *(উত্তর: Appendix J)*"},{"t":"h","c":"📦 SRS words"},{"t":"p","c":"いらっしゃいませ・いらっしゃいます・おります・まいります・めしあがります・いただきます・いたします・もうします・かしこまりました・しょうしょうおまちください・ございます・おまたせしました・おきゃくさま"},{"t":"h","c":"☑️ Self-check"},{"t":"li","c":"[ ] Keigo শুনলে ঘাবড়াই না — big-five চিনি"},{"t":"li","c":"[ ] Service-set মুখস্থ"},{"t":"li","c":"[ ] নিজের কাজ নিচু, অন্যের কাজ উঁচু — নিয়মটা বুঝি"}]},{"id":"ch20","num":20,"title":"JLPT N4 Exam Guide","part":"PART 3 — Grammar Expansion (JLPT N4)","blocks":[{"t":"p","c":"`unit: N4.M · level: N4 · আগে লাগবে: Ch.15–19 সব · app: mock exam (T-planned)`"},{"t":"h","c":"📖 Exam snapshot"},{"t":"table","rows":[["বিষয়","তথ্য"],["Sections","৩টা: ①文字・語彙 (script-vocab) ②文法・読解 (grammar-reading) ③聴解 (listening)"],["সময়","মোট ~১১৫ মিনিট"],["Scale","প্রতি scale ০–৬০, মোট ১৮০"],["Pass","মোট ৯০+ **এবং** প্রতি section এ minimum (১৯/৩৮/১৯ ধাঁচে) ★"],["কবে","বছরে দুইবার — জুলাই ও ডিসেম্বর (বাংলাদেশে দুটোই হয়, ঢাকায়)"],["লাগবে","~১,৫০০ শব্দ · ~৩০০ কানজি · এই Part এর সব grammar"]]},{"t":"p","c":"★ মানে শুধু মোট ৯০ হলে হবে না — কোনো এক section শূন্যের কাছে গেলে fail। দুর্বলতম section টাই তোমার আসল শত্রু — app এর progress screen এ \"focus next\" ওটাই দেখায়।"},{"t":"h","c":"📖 JFT-Basic এর সাথে পার্থক্য — মাথা টিউন করো"},{"t":"p","c":"JFT ছিল \"জীবনে চালাতে পারো?\" পরীক্ষা; N4 হলো \"ভাষাটা **জানো**?\" পরীক্ষা। এখানে grammar সরাসরি জিজ্ঞেস করবে: ঠিক form কোনটা — てもいい?なければならない?れる/られる? কানজিও পড়তে হবে furigana ছাড়া। তাই N4 প্রস্তুতির আলাদা দুই কাজ: **কানজি ৩০০** (Appendix F এর plan) আর **grammar drill** (Ch.15–19 র সব ✍️ আবার, এবার সময় ধরে)।"},{"t":"h","c":"📖 Section-কৌশল"},{"t":"p","c":"**文字・語彙 (~২৫ min):** কানজির পড়া (漢字読み), বানান, context-শব্দ। দ্রুত যাও — না পারলে guess, দাগ, next। এখানে জেতা সময় reading এ লাগবে। **文法・読解 (~৫৫ min):** ⭐ N4 র যুদ্ধক্ষেত্র। Grammar form বাছা + বাক্য-জোড়া (文の組み立て — শব্দ সাজিয়ে ★ জায়গার শব্দ বের করা: word-block অনুশীলনের exam-ভার্সন!) + ছোট passage। Reading এ প্রশ্ন আগে পড়ো, passage এ উত্তর খোঁজো — JFT কৌশলই, লেখা বড় শুধু। **聴解 (~৩৫ min):** ছবি-দেখে-উত্তর, পরের-কথা-কী, দ্রুত-উত্তর। Audio **একবারই** বাজে। প্রথম বাক্যে situation টা ধরো (কে কার সাথে? দোকান না office?) — উত্তর প্রায়ই শেষ ২ সেকেন্ডে উল্টে যায় (じゃなくて… \"না, বরং...\") — শেষ পর্যন্ত শোনো!"},{"t":"h","c":"📖 ১২-সপ্তাহ plan (JFT pass করার পর থেকে ধরে)"},{"t":"table","rows":[["সপ্তাহ","ফোকাস"],["১–৩","Ch.15–16 (て + plain) পাকা করো — এ দুটোই N4 grammar এর মেরুদণ্ড। কানজি: দিনে ৫টা"],["৪–৬","Ch.17–19 + かもしれない・なければならない・たら/ば জাতীয় N4 form গুলো app এ drill। কানজি চলছে"],["৭–৯","Reading stamina: দিনে ১টা ছোট passage; listening: দিনে ১০ min জাপানি শোনা (NHK Easy News দারুণ)"],["১০–১১","Full mock ×২ সময় ধরে; ভুলগুলোর গাছ বানাও — কোন branch দুর্বল"],["১২","দুর্বল branch only + বিশ্রাম। নতুন কিছু না"]]},{"t":"h","c":"📖 পরীক্ষার দিন"},{"t":"p","c":"JLPT paper-based — পেন্সিল (HB) + eraser নাও, admission voucher + ID। Marks sheet এ গোল্লা ভরাট — ঘর মিস কোরো না (এক লাইন সরে গেলে পুরো section শেষ!)। Section এর মাঝে বিরতি আছে — পানি/টয়লেট সেরে নাও, listening এ ওঠা যায় না।"},{"t":"h","c":"☑️ Ready checklist"},{"t":"li","c":"[ ] Ch.15–19 সব self-check সবুজ"},{"t":"li","c":"[ ] Mock এ ১২০+/১৮০ ধারাবাহিক (safety margin সহ pass)"},{"t":"li","c":"[ ] ৩০০ কানজির ২৫০+ চিনি"},{"t":"li" ","blocks":[{"t":"p","c":"N5 কানজি থিম ধরে শেখো — এলোমেলো তালিকায় না:"},{"t":"li","c":"**সংখ্যা (১৫):** 一二三四五六七八九十百千万円年"},{"t":"li","c":"**সময়-দিন (১২):** 日月火水木金土曜時分半今"},{"t":"li","c":"**মানুষ-পরিবার (১০):** 人男女子父母友先生私名"},{"t":"li","c":"**জায়গা-দিক (১৪):** 上下中外右左前後東西南北国駅"},{"t":"li","c":"**প্রকৃতি (১০):** 山川田天気雨空花魚犬"},{"t":"li","c":"**ক্রিয়া-মূল (২০):** 行来見聞食飲買読書話立見入出休"},{"t":"li","c":"**বিশেষণ-মূল (১০):** 大小新古高安長白早多"},{"t":"li","c":"**জীবন (৯):** 学校会社電車車道店家"},{"t":"p","c":"প্রতিটার সাথে একটা চেনা শব্দ বাঁধো: 駅(えき = station) → とうきょうえき। App এর stroke-order animation এ লেখা practice করো। দিনে ৩টা = মাসে ~১০০। N4 এর বাকি ২০০ এই methodেই।"},{"t":"p","c":"## Appendix G — উচ্চারণ Clinic (বাংলাভাষীর মহা-তালিকা) সব chapter এর trap এক জায়গায় — record করে নিজের সাথে মেলাও: 1. **ざ/ず/ぜ/ぞ (z):** বাংলা \"জ\" (dʒ) দিয়ে নয় — জিভ দাঁতের পেছনে, মৌমাছির zzz। かぜ・みず・ぜんぜん। **#1 ভুল, প্রতিদিন drill।** 2. **つ (tsu):** ৎ+সু। つくえ・きって・いつ। 3. **ふ (fu):** মোমবাতি নেভানোর ফুঁ — দাঁত ঠোঁটে লাগবে না। ふゆ・ふたつ। 4. **লম্বা vs ছোট vowel:** おばさん/おばあさん · びょういん/びよういん · ビル/ビール — অর্থ বদলে যায়। শোনার drill: minimal pair গুলো app এ আছে। 5. **ছোট っ:** কাত্তে-নিয়ম — থামো এক beat। きって・ちょっと・かって। 6. **う unrounded:** ঠোঁট flat। です/します র শেষ う প্রায় silent। 7. **ら行:** এক-টোকা ড়-ঘেঁষা র। らりるれろ দিয়ে জিভ-ব্যায়াম। 8. **Pitch accent:** জাপানি শব্দের সুর আছে — あめ↓ (বৃষ্টি) vs あめ↑ (candy)। App এর pitch trainer এ শুনে মেলাও; নিয়ম মুখস্থের চেয়ে কান তৈরিই আসল। 9. **ん এর রূপ:** পরের sound এ মিশে ন/ম/ং হয় — せんぱい=সেম্পাই। স্বাভাবিক, আলাদা করে বোলো না। 10. **Aspiration কমাও:** বাংলা খ/ছ/থ এর হাওয়া জাপানিতে নেই — か=কা (খা না), た=তা (থা না)।"},{"t":"p","c":"## Appendix H — দুই exam এর তথ্য-কার্ড (২০২৬) **JFT-Basic:** CBT · ৬০ min · ~৫০ প্রশ্ন · ৪ section · ২৫০ pts · pass ২০০ (SSW) · আগস্ট ২০২৬ থেকে A1(১৪৫+)/A2.1(১৭৫+)/A2.2(২০০+) band · বছরজুড়ে বহুবার · বাংলাদেশে center আছে · খুঁটিনাটি: Ch.14 **JLPT N4:** Paper · ~১১৫ min · ৩ section (60+60 scale, মোট ১৮০) · pass ৯০ + section-minimum · বছরে ২ বার (জুলাই/ডিসেম্বর) · ঢাকায় হয় · খুঁটিনাটি: Ch.20 Registration দুটোরই online — দালাল ছাড়া নিজে করো, লাগলে কারো help নাও কিন্তু নিজের email/পাসওয়ার্ড নিজের কাছে।"},{"t":"p","c":"## Appendix I — Grammar index (কোন chapter এ কী) です・は → Ch.4 · か প্রশ্ন・の・から(থেকে) → Ch.5 · これ/それ/あれ・を・で(মাধ্যম) → Ch.6 · と(এবং)・counters → Ch.7 · ます/ません・に(সময়)・で(জায়গা) → Ch.8 · が・〜たいです・も → Ch.9 · あります/います・に(অবস্থান) → Ch.10 · 〜てください・〜てもいいですか・〜ないでください → Ch.11 · ました・ね/よ・〜かった → Ch.12 · ক্ষমার স্তর・〜てしまいました → Ch.13 · て-form নিয়ম・〜ています → Ch.15 · plain form・とおもいます・から(কারণ) → Ch.16 · potential・できます → Ch.17 · あげる/くれる/もらう・て+trio → Ch.18 · keigo তিন শাখা → Ch.19"},{"t":"p","c":"## Appendix J — অনুশীলনের উত্তরমালা (নমুনা উত্তর) **Ch.1 A:** আসা・ইনু・উমি・কাসা・মিzু・নেকো・কিত্তে・গাক্কোː・ক্যোː **C:** とよた・ほんだ・すずき **Ch.2 A:** কোːহীː(coffee)・তেরেবি(TV)・বাসু(bus)・কারেː(curry)・আইসু・কোনবিনি・সুমাহো(smartphone)・তোইরে **C:** パン=রুটি・ミルク=দুধ・ジュース=জুস **Ch.3 A:** じゅうなな・よんじゅうに・さんびゃくろくじゅうご・きゅうひゃくきゅうじゅう・ごせん・にまん **B:** いま よじはんです。/ これはいくらですか。/ はっぴゃくはちじゅうえんです。 **Ch.4 A:** ১.おはようございます ২.おやすみなさい ৩.ありがとうございます/すみません ৪.おつかれさまでした **C:** わたしはラキブです。 **Ch.5 A:** ১.あなたはにほんじんですか ২.おしごとはなんですか ৩.おくにはどちらですか **C:** おしごとはなんですか。 **Ch.6 A:** はい、おねがいします/いいえ、いりません ×৩ pattern **B:** あれはいくらですか。/これをください。/レシートをください。 **C:** これをください。/それはいくらですか。 **Ch.7 A:** ১.ラーメンをひとつとみずをください ২.カレーライスをふたつください ৩.おすすめはなんですか **C:** ぎゅうどんをひとつください。/ぶたにくははいっていますか。 **Ch.8 A:** ১.すみません、でんしゃがおくれています ২.おさきにしつれいします ৩.わかりました **C:** に・で・で **Ch.9 A:** ১.みっかまえから せきがでます ২.はがいたいです。はいしゃにいきたいです ৩.きゅうきゅうしゃをよんでください! **Ch.10 A:** ১.ちかくにATMはありますか ২.このバスはえきにいきますか ৩.なんぷんかかりますか **B:** সোজা গিয়ে দ্বিতীয় signal এ বামে। **Ch.11 A:** ১.まどをあけてもいいですか ২.さきにかえってもいいですか ৩.このペンをつかってもいいですか **B:** ১.もういちどみせてください ২.ゆっくりはなしてください ৩.かいてください **Ch.12 A:** たべました・みました・かいました・しました・べんきょうしました **C(নমুনা):** ১.あしたはあついとおもいます ২.かれはこないとおもいます **Ch.13 A:** ১.すみません ২.もうしわけありません ৩.ごめんなさい **B formula:** すみません。[X]。もうしわけありません。 **C:** মেশিন বন্ধ করো / ওখানে ঢুকো না **Ch.15 A:** かいて・のんで・まって・はなして・きて・して・いって・あそんで **Ch.16 A:** いく・いった・いかない・たべる?・く const seed=(s)=>[...s].reduce((a,c)=>(a+c.charCodeAt(0))&0x7fffffff,0);
function buildBatch(lessons,completed,maxItems=8){
  const next=lessons.find(l=>!completed.has(l.id)&&l.items.length>0);
  if(!next)return null;
  const poolL=[],poolG=[];
  for(const it of next.items)if(!poolL.includes(it.bn))poolL.push(it.bn);
  for(const l of lessons){if(l===next)continue;
    for(const it of l.items){if(!poolL.includes(it.bn)&&!poolG.includes(it.bn))poolG.push(it.bn);}}
  const qs=[];const items=next.items.slice(0,maxItems);
  for(let i=0;i<items.length;i++){const it=items[i];const correct=it.bn;const d=[];
    const local=poolL.filter(m=>m!==correct);
    for(let k=0;k<local.length&&d.length<3;k++)d.push(local[(k+i)%local.length]);
    for(let k=0;k<poolG.length&&d.length<3;k++)d.push(poolG[(k+i)%poolG.length]);
    if(d.length<3)continue;
    const ai=seed(it.id)%4;const opts=[...d];opts.splice(ai,0,correct);
    const head=(it.kana||it.jp)[0];
    qs.push({jp:it.jp,yomi:it.kana+' · '+it.romaji,options:opts,answer:ai,
      hint:'「'+head+'」 দিয়ে শুরু — '+it.note,note:it.note});}
  return qs.length?{lessonId:next.id,title:next.canDo,qs}:null;
}

      let st='';if(L.picked===i)st=i===q.answer?`background:${m[0]};border-color:${m[0]};color:#111`
        :'border-color:var(--struggle);background:#F0954B26';

function pick(i){const q=L.qs[L.idx];if(L.picked===i||L.done)return;
  if(i===q.answer){L.picked=i;L.mood='flow';L.note=q.note;rLesson();
    setTimeout(()=>{L.streak++;L.mood=L.streak>=3?'boredom':'flow';
      if(L.idx>=L.qs.length-1){L.done=true;if(L.lessonId)completed.add(L.lessonId);}
      else L.idx++;L.picked=-1;L.hintOpen=false;rLesson();},600);}
  else{L.wrongs++;L.streak=0;L.picked=i;L.hintOpen=true;
    L.mood=L.wrongs>=3?'burnout':'struggle';rLesson();}}
function skipQ(){L.idx=Math.min(L.idx+1,L.qs.length-1);L.picked=-1;L.hintOpen=false;L.mood='neutral';L.note=null;rLesson();}

// ── WRITE (kana + sound context + intro, stroke animation from real medians) ──
let W={kata:false,idx:0,intro:true,ink:[],anim:0,animOn:false};
function kchars(){return W.kata?DATA.kata:DATA.hira;}
function rWrite(){
  const ks=kchars(),k=ks[W.idx];
  $('scr-write').innerHTML=`<div class="row"><button class="back" onclick="pop()">←</button><b style="flex:1">লিখো · Write</b></div>
  ${W.intro?`<div class="card" style="background:var(--card2)"><b style="font-size:13px">এটা কী শিখছ?</b>
    <p style="font-size:12px;line-height:1.55;color:var(--text)">হিরাগানা আর কাতাকানা হলো জাপানি "বর্ণমালা" — বাংলার মতোই sound-based। হিরাগানা (৪৬টা) দিয়ে জাপানি শব্দ ও grammar লেখা হয় — আগে এটা। কাতাকানা same ৪৬ sound — বিদেশি শব্দ আর তোমার নিজের নাম লিখতে। ৫টা vowel: あ(আ) い(ই) う(উ) え(এ) お(ও) — বাকি সব consonant+vowel। সঠিক stroke order এ লেখো — জাপানিরা এক নজরে চেনে।</p>
    <div style="text-align:right"><button class="pillbtn" style="min-height:34px" onclick="W.intro=false;rWrite()">বুঝেছি</button></div></div>`:''}
  <div style="display:flex;gap:8px;margin:6px 0">
    <button class="pillbtn" style="flex:1;${!W.kata?'background:#fff;color:#111;border:0':''}" onclick="W.kata=false;W.idx=0;W.ink=[];rWrite()">ひらがな</button>
    <button class="pillbtn" style="flex:1;${W.kata?'background:#fff;color:#111;border:0':''}" onclick="W.kata=true;W.idx=0;W.ink=[];rWrite()">カタカナ</button></div>
  <div class="kstrip">${ks.map((x,i)=>`<div class="${i===W.idx?'on':''}" onclick="W.idx=${i};W.ink=[];W.animOn=false;rWrite()">${x.char}</div>`).join('')}</div>
  <div style="text-align:center;margin:2px 0 6px"><b style="font-size:18px">${k.char}</b>
    <span class="small" style="font-size:13.5px"> ${k.romaji} · উচ্চারণ: <b style="color:var(--text)">${k.bn}</b></span></div>
  <canvas id="paper" class="paper" width="340" height="340"></canvas>
  <div class="toolbar">
    <button class="pillbtn acc2" style="flex:1;background:var(--pink)" onclick="playStroke()">▶ দেখো</button>
    <button class="pillbtn" style="flex:1" onclick="W.ink=[];W.animOn=false;drawPaper()">মুছো</button>
    <button class="pillbtn" style="flex:2" onclick="W.idx=(W.idx+1)%kchars().length;W.ink=[];W.animOn=false;rWrite()">Skip / পরের ›</button></div>`;
  setupPaper();drawPaper();
}
function med(){const s=W.kata?'katakana':'hiragana';return DATA.strokes[s]?.[kchars()[W.idx].char]??null;}
function drawPaper(){const c=$('paper');if(!c)return;const g=c.getContext('2d'),w=c.width;
  g.fillStyle='#FBFBFD';g.fillRect(0,0,w,w);g.strokeStyle='#E6E7EE';g.lineWidth=1.4;
  const p=w*.06;g.strokeRect(p,p,w-2*p,w-2*p);
  g.beginPath();g.moveTo(w/2,p);g.lineTo(w/2,w-p);g.moveTo(p,w/2);g.lineTo(w-p,w/2);g.stroke();
  if(!W.animOn){g.fillStyle='#E3E4EC';g.font=(w*.7)+'px sans-serif';g.textAlign='center';g.textBaseline='middle';
    g.fillText(kchars()[W.idx].char,w/2,w/2+w*.03);}
  g.lineCap='round';g.lineJoin='round';
  if(W.animOn){const m=med();if(m){g.strokeStyle='#14141F';g.lineWidth=w*.06;const sc=w/1000;
    const lens=m.map(st=>{let L=0;for(let i=1;i<st.length;i++)L+=Math.hypot(st[i][0]-st[i-1][0],st[i][1]-st[i-1][1]);return L;});
    let target=W.anim*lens.reduce((a,b)=>a+b,0);
    for(let s=0;s<m.length&&target>0;s++){const st=m[s];g.beginPath();g.moveTo(st[0][0]*sc,st[0][1]*sc);let acc=0;
      for(let i=1;i<st.length;i++){const seg=Math.hypot(st[i][0]-st[i-1][0],st[i][1]-st[i-1][1]);
        if(acc+seg<=target){g.lineTo(st[i][0]*sc,st[i][1]*sc);acc+=seg;}
        else{const f=(target-acc)/seg;g.lineTo((st[i-1][0]+(st[i][0]-st[i-1][0])*f)*sc,(st[i-1][1]+(st[i][1]-st[i-1][1])*f)*sc);break;}}
      g.stroke();target-=lens[s];}}}
  g.strokeStyle='#14141F';g.lineWidth=w*.045;
  for(const st of W.ink){if(st.length<2)continue;g.beginPath();g.moveTo(st[0][0],st[0][1]);
    for(let i=1;i<st.length;i++)g.lineTo(st[i][0],st[i][1]);g.stroke();}}
function playStroke(){if(!med())return;W.ink=[];W.animOn=true;W.anim=0;
  const step=()=>{W.anim+=.02;drawPaper();if(W.anim<1)requestAnimationFrame(step);};step();}
function setupPaper(){const c=$('paper');if(!c)return;let down=false;
  const pos=e=>{const r=c.getBoundingClientRect();
    return[(e.clientX-r.left)*c.width/r.width,(e.clientY-r.top)*c.height/r.height];};
  c.onpointerdown=e=>{down=true;W.animOn=false;W.ink.push([pos(e)]);drawPaper();};
  c.onpointermove=e=>{if(!down)return;W.ink[W.ink.length-1].push(pos(e));drawPaper();};
  c.onpointerup=()=>down=false;}
