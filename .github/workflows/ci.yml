name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  # Guaranteed-green gate: content validation + the runnable logic proofs.
  # Bad content or broken FSRS/pitch/migration/lesson-flow logic fails the build.
  content-and-logic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate content (05 rules — blocks bad/dark-pattern content)
        run: node tools/validate_content.mjs
      - name: FSRS engine proof
        run: node tools/fsrs_reference.mjs
      - name: Pitch-accent proof
        run: node tools/pitch_reference.mjs
      - name: DB migration runner proof
        run: node tools/migrations_reference.mjs
      - name: Lesson micro-loop state-machine proof
        run: node tools/lesson_flow_reference.mjs
      - name: Agent system proof (Director + Scaffold decision tables)
        run: node tools/agents_reference.mjs
      - run: node tools/curriculum_reference.mjs
      - name: Classroom batch proof (T-112 answer-key MC builder)
        run: node tools/batch_reference.mjs

  # Compiles and tests the Flutter app. gen-l10n MUST run before analyze/test
  # because app_localizations.dart is generated, not committed.
  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          # Matches the version the codebase is verified against locally
          # (theme.dart uses DialogThemeData/WidgetState APIs newer than 3.24).
          flutter-version: '3.44.5'
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter gen-l10n
      - run: flutter analyze
      - run: flutter test
