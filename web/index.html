<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Bhasago">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Bhasago — ভাষাGO</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Branded boot splash (D-032): the engine takes seconds to load — show the
       brand instead of a blank white page. Removed on flutter-first-frame. -->
  <style>
    html, body { background: #111111; margin: 0; }
    #boot {
      position: fixed; inset: 0; background: #111111; z-index: 9999;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 18px; transition: opacity .4s;
      font-family: system-ui, sans-serif;
    }
    #boot img { width: 96px; height: 96px; border-radius: 24px;
      animation: pulse 1.6s ease-in-out infinite; }
    #boot .t { color: #F5F5F0; font-size: 20px; font-weight: 800;
      letter-spacing: .5px; }
    #boot .s { color: #8B8B85; font-size: 13px; }
    @keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(.94); opacity: .8; } }
  </style>
  <div id="boot">
    <img src="icons/Icon-192.png" alt="">
    <div class="t">Bhasago</div>
    <div class="s">লোড হচ্ছে… একটু দাঁড়াও</div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var b = document.getElementById('boot');
      if (b) { b.style.opacity = '0'; setTimeout(function(){ b.remove(); }, 450); }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
