name: sensei_app
description: >-
  Bhasago — offline Bengali/English/Japanese-UI Japanese tutor for Bangladeshi
  workers preparing for JFT-Basic (A2) / JLPT N4 and life in Japan.
publish_to: "none"
version: 0.9.0+2

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  collection: ^1.18.0
  intl: ^0.20.2
  flutter_riverpod: ^2.5.1
  sqflite_sqlcipher: ^3.4.0   # SQLCipher AES-256 (encrypted at rest — T-101/06)
  flutter_secure_storage: ^9.2.4  # Keystore-backed DB passphrase store
  shared_preferences: ^2.2.3
  path: ^1.9.0
  record: ^7.0.0       # mic capture for shadowing
  just_audio: ^0.10.0  # native reference-audio playback
  fftea: ^1.5.0        # on-device pitch (F0) extraction for accent scoring
  archive: ^3.6.1      # pure-Dart ZIP for one-tap offline data export (01)
  path_provider: ^2.1.4 # documents dir for the export file
  dio: ^5.7.0
  crypto: ^3.0.5
  flutter_tts: ^4.2.0  # on-device Bengali TTS for reading AI explanations aloud
  supabase_flutter: ^2.8.0 # OPTIONAL cloud sync (D1) — anon key is public; RLS guards data
  speech_to_text: ^7.0.0 # voice input for talk-to-sensei (device/browser STT)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # gen-l10n ENABLED (l10n migration done 2026-07-17): the ARBs (bn/en/ja) now
  # carry the ~20 strings the code uses, so build-time gen-l10n regenerates
  # lib/l10n/app_localizations*.dart correctly instead of wiping them. Verified:
  # `flutter gen-l10n` keeps all getters + analyze clean. Adding a NEW localized
  # string = add its key to ALL three .arb files (template = app_en.arb).
  generate: true
  assets:
    - assets/content/
    - assets/stroke/
    - assets/curriculum/
    - assets/book/
    - assets/audio/

  # v4 "Bold Ink" brand fonts (TTFs live in assets/fonts/).
  fonts:
    - family: Baloo Da 2
      fonts:
        - asset: assets/fonts/BalooDa2.ttf
    - family: Zen Kaku Gothic New
      fonts:
        - asset: assets/fonts/ZenKakuGothicNew-Medium.ttf
          weight: 500
        - asset: assets/fonts/ZenKakuGothicNew-Bold.ttf
          weight: 700
        - asset: assets/fonts/ZenKakuGothicNew-Black.ttf
          weight: 900
    - family: Archivo
      fonts:
        - asset: assets/fonts/Archivo.ttf
    - family: Space Grotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk.ttf
    # Alias — step-6 handoff code uses the no-space family name.
    - family: ZenKakuGothicNew
      fonts:
        - asset: assets/fonts/ZenKakuGothicNew-Medium.ttf
          weight: 500
        - asset: assets/fonts/ZenKakuGothicNew-Bold.ttf
          weight: 700
        - asset: assets/fonts/ZenKakuGothicNew-Black.ttf
          weight: 900

# Native model integration (llama.cpp / whisper.cpp / Kokoro) is wired through
# a Kotlin MethodChannel on the Android side — see README.
