<style>
:root{--bg:#0F0F0F;--card:#1A1A1A;--card2:#242424;--line:#2E2E2E;--pill:#3A3A3A;
--text:#F5F5F0;--muted:#8F8F8A;--yellow:#EFE94B;--pink:#F06EB7;--blue:#4D7DF7;
--green:#35E065;--red:#B3121B;--redsub:#F5B8BC;--struggle:#F0954B;--bore:#A78BF7;--onacc:#111;
--font:-apple-system,"Segoe UI",Roboto,"Noto Sans Bengali","Noto Sans JP","Hiragino Sans",sans-serif}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:#000;font-family:var(--font);color:var(--text)}
.stage{display:flex;justify-content:center;padding:18px}
.phone{width:390px;height:844px;background:var(--bg);border-radius:34px;border:1px solid var(--line);
overflow:hidden;display:flex;flex-direction:column;position:relative}
.screen{flex:1;overflow-y:auto;padding:16px;display:none}
.screen.on{display:block}
.nav{display:flex;border-top:1px solid var(--line);background:var(--bg);padding:8px 10px;gap:6px}
.nav button{flex:1;border:0;background:transparent;color:var(--muted);font-family:var(--font);
font-size:11px;padding:8px 4px;border-radius:99px;cursor:pointer;font-weight:700}
.nav button.on{background:#fff;color:#111}
h1{font-size:26px;margin:4px 0 12px;font-weight:800}
.row{display:flex;justify-content:space-between;align-items:center}
.small{font-size:12px;color:var(--muted)}
.bar{height:8px;border-radius:99px;background:#262626;overflow:hidden;margin:6px 0 14px}
.bar i{display:block;height:100%;background:var(--yellow)}
.acc{border-radius:20px;padding:16px;margin-bottom:10px;cursor:pointer;color:var(--onacc)}
.acc h3{margin:0 0 4px;font-size:15px}.acc p{margin:0;font-size:11.5px;opacity:.8}
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:14px;margin-bottom:10px}
.pillbtn{border:1.5px solid var(--pill);background:transparent;color:var(--text);border-radius:99px;
min-height:44px;padding:0 16px;font-family:var(--font);font-weight:700;font-size:12.5px;cursor:pointer}
.pillbtn.acc2{border-color:transparent;color:#111}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.opt{border:1.5px solid var(--pill);border-radius:99px;min-height:46px;background:transparent;
color:var(--text);font-family:var(--font);font-weight:700;font-size:13px;cursor:pointer}
.moodpill{border:1.5px solid;border-radius:99px;padding:3px 11px;font-size:11px;font-weight:700;
display:inline-flex;align-items:center;gap:6px}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.jp{font-size:54px;font-weight:900;text-align:center;margin:6px 0 0}
.yomi{text-align:center;font-size:13.5px;color:var(--muted);font-weight:700;margin-bottom:12px}
.qlabel{text-align:center;font-size:11.5px;font-weight:700;letter-spacing:.5px}
.hint{border:1.5px solid;border-radius:16px;padding:12px 14px;font-size:12.5px;margin-top:10px}
.teacher{display:flex;align-items:flex-end;gap:10px;margin-top:14px}
.bubble{background:var(--card);border:1px solid var(--line);border-radius:14px 14px 14px 3px;
padding:8px 12px;font-size:12px;max-width:250px}
.toolbar{display:flex;gap:10px;margin-top:12px}
.sheet{position:absolute;left:0;right:0;bottom:0;height:76%;background:#141414;border-top:1px solid var(--line);
border-radius:24px 24px 0 0;padding:12px 16px;display:none;flex-direction:column;z-index:9}
.sheet.on{display:flex}
.msg{max-width:280px;padding:9px 13px;border-radius:16px;font-size:12.5px;margin:4px 0;line-height:1.5}
.chips{display:flex;gap:8px;overflow-x:auto;padding:6px 0}
.chips button{white-space:nowrap;border:1px solid var(--line);background:transparent;color:var(--muted);
border-radius:99px;min-height:34px;padding:0 14px;font-size:11.5px;font-weight:700;cursor:pointer;font-family:var(--font)}
.tl{display:flex;gap:12px;margin-bottom:8px}
.tl .dotcol{width:34px;display:flex;flex-direction:column;align-items:center}
.tl .knot{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px}
.tl .conn{flex:1;width:2px;background:#242424}
.ucard{flex:1;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px;margin-bottom:4px}
.ucard.cur{background:var(--red);border-color:var(--red);color:#F5F5F0}
canvas.paper{background:#FBFBFD;border-radius:20px;width:100%;touch-action:none}
.kstrip{display:flex;overflow-x:auto;gap:8px;padding:6px 0}
.kstrip div{min-width:46px;height:42px;border-radius:12px;background:#ffffff1a;display:flex;
align-items:center;justify-content:center;font-size:22px;cursor:pointer}
.kstrip div.on{background:var(--pink)}
.chap{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);
border-radius:16px;padding:12px;margin-bottom:8px;cursor:pointer}
.chnum{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800}
.back{background:transparent;border:0;color:var(--muted);font-size:18px;cursor:pointer;padding:6px 10px 6px 0}
.note{font-size:10.5px;color:#5A6472;text-align:center;padding:6px}
table{border-collapse:collapse;font-size:11.5px;margin:6px 0}
td,th{border:1px solid var(--line);padding:4px 8px}
blockquote{border-left:3px solid var(--green);margin:6px 0;padding:4px 10px;color:var(--muted);font-size:12px}
.depth{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.sun{position:absolute;top:46px;right:-34px;width:150px;height:150px;border-radius:50%;background:radial-gradient(circle at 42% 38%,rgba(216,64,64,.34),rgba(216,64,64,.1) 62%,transparent 78%);animation:sunPulse 7s ease-in-out infinite}
.fk{position:absolute;font-weight:900}
@keyframes sunPulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.06);opacity:.7}}
@keyframes floatA{0%,100%{transform:translate(0,0)}50%{transform:translate(6px,-14px)}}
@keyframes floatB{0%,100%{transform:translate(0,0)}50%{transform:translate(-10px,12px)}}
@keyframes starSpin{0%,100%{transform:rotate(0) scale(1)}50%{transform:rotate(12deg) scale(1.08)}}
@keyframes pulseDot{0%,100%{opacity:.25}50%{opacity:1}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>

না — এইভাবে সস্তা বিকল্প চাওয়া যায়"},{"id":"sh_05","jp":"べつのいろはありますか","kana":"べつのいろはありますか","romaji":"betsu no iro wa arimasu ka","bn":"অন্য রঙের আছে?","note":"iro-র জায়গায় saizu বললে সাইজ জিজ্ঞেস করা হয়"},{"id":"sh_06","jp":"レシートをください","kana":"レシートをください","romaji":"reshiito o kudasai","bn":"রসিদটা দিন","note":"কাজের খরচ ফেরত পেতে রসিদ রেখে দাও"},{"id":"sh_07","jp":"ふくろをください","kana":"ふくろをください","romaji":"fukuro o kudasai","bn":"একটা ব্যাগ দিন","note":"২০২০ থেকে ব্যাগের দাম ৩-৫ ইয়েন; ক্যাশিয়ার জিজ্ঞেস করবেই"},{"id":"sh_08","jp":"みているだけです","kana":"みているだけです","romaji":"mite iru dake desu","bn":"শুধু দেখছি","note":"দোকানের কর্মী সাহায্য করতে এলে ভদ্রভাবে এটা বলো"}]}],"book":[{"id":"intro","num":0,"title":"ভূমিকা — এই বইটা কেন আলাদা","part":"","blocks":[{"t":"p","c":"দোকানে গেলে Japanese শেখার বই পাবে অনেক — কিন্তু প্রায় সবগুলোই English-medium। মানে তোমাকে আগে English এর ফিল্টার দিয়ে জাপানি বুঝতে হয়। \"The particle wa marks the topic of the sentence\" — এই লাইন পড়ে কার কী লাভ হলো বলো?"},{"t":"p","c":"অথচ মজার ব্যাপার হলো — **বাংলাভাষীদের জন্য Japanese শেখা English-ভাষীদের চেয়ে অনেক সহজ।** এটা মোটিভেশনাল কথা না, pure linguistics:"},{"t":"p","c":"**১. Word order হুবহু এক।** বাংলা: আমি ভাত খাই (Subject → Object → Verb)। জাপানি: わたしは ごはんを たべます — আমি → ভাত → খাই। Same order! English-ভাষীদের brain কে উল্টাতে হয় (\"I eat rice\"), তোমার হয় না। তুমি already অর্ধেক রাস্তা এগিয়ে।"},{"t":"p","c":"**২. Particle জিনিসটা তোমার কাছে নতুন না।** বাংলায় আমরা বলি \"ঢাকা**তে**\", \"আমা**কে**\", \"বাবা**র**\"। জাপানিতেও ঠিক তাই — শব্দের **পরে** ছোট marker বসে: とうきょう**に** (টোকিও**তে**), わたし**の** (আমা**র**)। English এর মতো আগে বসা preposition (in Tokyo) না — বাংলার মতোই পরে। তোমার brain এটা জন্ম থেকে জানে।"},{"t":"p","c":"**৩. সম্মানের স্তর — আপনি/তুমি/তুই আমাদের রক্তে আছে।** জাপানি ভাষার সবচেয়ে \"কঠিন\" জিনিস নাকি politeness levels — です/ます form, casual form, keigo। কিন্তু ভেবে দেখো: তুমি তো এমনিতেই স্যারের সাথে এক ভাষায় কথা বলো, বন্ধুর সাথে আরেক ভাষায়। \"খেয়েছেন?\" আর \"খাইছিস?\" — এই switch টা তুমি প্রতিদিন করো। জাপানিরাও ঠিক এটাই করে। English speaker দের এই concept টাই নতুন করে শিখতে হয়।"},{"t":"p","c":"**৪. Counter word ও আমাদের আছে।** জাপানিতে মানুষ গুনতে 人 (নিন), লম্বা জিনিস গুনতে 本 (হোন) — শুনে ভয় লাগে? বাংলায় আমরা বলি \"দুই**জন** মানুষ\", \"দুই**টা** আম\", \"দুই**খানা** রুটি\"। জন/টা/খানা — এগুলোই counter। Same system।"},{"t":"p","c":"**৫. উচ্চারণ ৯০% match।** জাপানির ৫টা vowel (あいうえお = আ ই উ এ ও) সবগুলোই বাংলায় আছে। ছোট্ট থেমে যাওয়া っ (যেমন きって)? বাংলার \"চাক্কা\", \"দুক্কু\" — double consonant আমরা এমনিই বলি। বাকি থাকে মাত্র কয়েকটা sound — ざ行 (za/zu/ze/zo), つ (tsu), ふ (fu) — সেগুলোর জন্য আলাদা করে **উচ্চারণ trap** section আছে প্রতিটা chapter এ।"},{"t":"p","c":"তাহলে সমস্যাটা কোথায় ছিল? সমস্যা ছিল — **বাংলা দিয়ে জাপানি শেখার কোনো সিরিয়াস, exam-aligned বই ছিল না।** N5 এর কিছু ছোটখাটো বই আছে, কিন্তু শূন্য থেকে JFT-Basic pass করে JLPT N4 পর্যন্ত নিয়ে যাওয়ার মতো complete curriculum — ছিল না। এই বইটা সেই ফাঁকটাই পূরণ করছে।"}]},{"id":"x_0","num":-1,"title":"এই বই কীভাবে বানানো (book-making logic)","part":"","blocks":[{"t":"p","c":"এলোমেলো topic এর collection না — এই বইয়ের কাঠামো তিনটা আন্তর্জাতিক standard এর উপর দাঁড়ানো:"},{"t":"li","c":"**JF Standard / Irodori Can-do framework** (Japan Foundation) — প্রতিটা chapter এর goal একটা \"Can-do\": বাস্তব জীবনে জাপানি দিয়ে তুমি কী **করতে পারবে**। \"Grammar point মুখস্থ\" না — \"দোকানে দামাদামি করতে পারা\"।"},{"t":"li","c":"**JFT-Basic (A2)** — SSW work visa র exam। Part 2 পুরোটা এই exam এর syllabus কভার করে।"},{"t":"li","c":"**JLPT N4** — Part 3 এর target। Care-giving, food, hospitality sector এ অনেক নিয়োগকর্তা N4 চায়।"},{"t":"p","c":"**Ordering টা precision-এ বানানো:** প্রতিটা chapter শুধু আগের chapter গুলোর শেখা জিনিস + অল্প কিছু নতুন ব্যবহার করে (ভাষাবিজ্ঞানে একে বলে **i+1** — comprehensible input)। কোনো chapter এ হঠাৎ অচেনা grammar এসে পড়বে না। প্রতিটা chapter এর মাথায় **আগে লাগবে** (prerequisite) লেখা আছে — SENSEI app এর curriculum graph ও ঠিক এই order টাই follow করে।"},{"t":"p","c":"**প্রতিটা content chapter এর ভেতরের গঠন সবসময় এক** (এটাই বইয়ের rhythm — app এর 5-phase lesson loop এর সাথে match করে):"},{"t":"table","rows":[["Section","কী থাকে","App এর কোন phase"],["🎯 এই chapter শেষে","Can-do goals","Intro"],["🎬 Scene","বাস্তব একটা situation দিয়ে শুরু","Intro"],["📖 শব্দ","Vocabulary table (জাপানি・kana・romaji・বাংলা)","Recognition"],["🧩 Grammar core","২–৪টা point, বাংলার সাথে মিলিয়ে","Recognition"],["💬 Dialogue","Full conversation, ভেঙে ভেঙে","Context"],["🗣️ উচ্চারণ trap","বাংলাভাষীদের specific ভুল","Production"],["⚠️ ভুল যেখানে হয়","Common mistakes + fix","Production"],["🏮 Culture corner","জাপানে জীবন/কাজের বাস্তব টিপস","—"],["✍️ অনুশীলন","A: চেনা → B: বলা/লেখা → C: sentence বানানো","সব phase"],["📦 SRS words","App এর review deck এ যে শব্দগুলো ঢুকবে","SRS"],["☑️ Self-check","Can-do checklist — নিজেকে যাচাই","—"]]},{"t":"p","c":"**পড়ার নিয়ম (সাজেশন, বাধ্যবাধকতা না):** দিনে একটা section যথেষ্ট। পুরো chapter এক বসায় শেষ করার দরকার নেই। আটকে গেলে skip করো — পরে ফিরে এসো। SENSEI app থাকলে chapter শেষের SRS words গুলো app এ review করো — spaced repetition মুখস্থের কাজটা science এর নিয়মে করে দেবে। আর হ্যাঁ — ভুল করা মানেই শেখা হচ্ছে। ভুল ছাড়া ভাষা শেখা যায় না, এটা exam না।"}]},{"id":"x_1","num":-1,"title":"পুরো রাস্তার Map","part":"","blocks":[{"t":"p","c":"``` PART 0 · লিপি Foundation (pre-A1)          ⏱ ~3-4 সপ্তাহ    Ch.1 হিরাগানা → Ch.2 কাতাকানা → Ch.3 সংখ্যা ও সময়         ↓ PART 1 · Survival Japanese (A1)             ⏱ ~4-6 সপ্তাহ    Ch.4 Greetings ও পরিচয় → Ch.5 নাম-দেশ-কাজ → Ch.6 Konbini → Ch.7 Restaurant         ↓ PART 2 · Daily Life ও কাজের জাপানি (A2)     ⏱ ~8-10 সপ্তাহ   ★ JFT-Basic এখানে    Ch.8 Workplace → Ch.9 Clinic → Ch.10 রাস্তা ও Transport → Ch.11 অনুমতি ও অনুরোধ    → Ch.12 অতীত ও Plan → Ch.13 সমস্যা ও ক্ষমা → Ch.14 JFT-Basic Exam Guide         ↓ PART 3 · Grammar Expansion (N4)             ⏱ ~10-12 সপ্তাহ  ★ JLPT N4 এখানে    Ch.15 て-form → Ch.16 Plain form → Ch.17 Potential → Ch.18 দেওয়া-নেওয়া    → Ch.19 Keigo পরিচিতি → Ch.20 JLPT N4 Exam Guide         ↓ PART 4 · এরপর কী? (N3 → N1 roadmap — basic থেকে pro হওয়ার রাস্তা) ```"},{"t":"p","c":"মোট সময় ধরো ৭–৯ মাস, দিনে ২০–৩০ মিনিট করে। কারো দ্রুত হবে, কারো ধীরে — দুটোই ঠিক আছে। Exam এর তারিখ না, **can-do** গুলোই আসল milestone।"},{"t":"h","c":"জাপানি পড়তে শেখো — এখান থেকেই সব শুরু"},{"t":"p","c":"জাপানি ভাষায় তিনটা লিপি পাশাপাশি চলে:"},{"t":"li","c":"**হিরাগানা (ひらがな)** — মূল লিপি। ৪৬টা অক্ষর। জাপানি শব্দ আর grammar এর সব অংশ এটা দিয়ে লেখা হয়। **আগে এটা।**"},{"t":"li","c":"**কাতাকানা (カタカナ)** — same ৪৬টা sound, আলাদা চেহারা। বিদেশি শব্দ লিখতে ব্যবহার হয় — যেমন バングラデシュ (Bangladesh), テレビ (TV)। তোমার নিজের নামও এটা দিয়েই লিখবে।"},{"t":"li","c":"**কানজি (漢字)** — চীনা থেকে আসা অর্থবোধক অক্ষর (山 = পাহাড়)। হাজার হাজার আছে, কিন্তু ভয় পেয়ো না — এই বইয়ে কানজি আসবে ধীরে ধীরে, আর N4 পর্যন্ত মাত্র ~৩০০টা লাগে। Appendix F তে starter list আছে।"},{"t":"p","c":"ভালো খবর: হিরাগানা-কাতাকানা **বর্ণমালার মতোই** — বাংলার মতো sound-based। বাংলা বর্ণমালা শিখেছ ৫০+ অক্ষর — এটা তার চেয়ে সহজ, কারণ জাপানি অক্ষরে যুক্তবর্ণের জঙ্গল নেই।"}]},{"id":"ch1","num":1,"title":"হিরাগানা (ひらがな)","part":"PART 0 — লিপি Foundation","blocks":[{"t":"p","c":"`unit: L0.1 · level: L0 · আগে লাগবে: কিছু না · app lesson: hiragana`"},{"t":"h","c":"🎯 এই chapter শেষে"},{"t":"li","c":"৪৬টা হিরাগানা **পড়তে** পারবে"},{"t":"li","c":"আঙুল দিয়ে সঠিক stroke order এ **লিখতে** পারবে"},{"t":"li","c":"দাকুতেন (゛), হান্দাকুতেন (゜), ছোট っ, আর よう/ゆ combination পড়তে পারবে"},{"t":"h","c":"🎬 Scene"},{"t":"p","c":"ঢাকার এক training center এ প্রথম দিন। Board এ লেখা: あいうえお। Sir বললেন — \"এই পাঁচটা চিনলে বাকি সব চেনা হয়ে যাবে।\" সত্যি কথা। জাপানি লিপির পুরো system টা এই ৫টা vowel এর উপর দাঁড়িয়ে।"},{"t":"h","c":"📖 The System — ৫টা vowel, বাকি সব combination"},{"t":"p","c":"জাপানি sound গুলো সাজানো ৫টা কলামে: **あ(a) い(i) う(u) え(e) お(o)** — বাংলার আ, ই, উ, এ, ও। প্রতিটা row = একটা consonant + এই ৫ vowel। পুরো chart (একে বলে 五十音 gojūon):"},{"t":"table","rows":[["Row","あ-column","い","う","え","お"],["—","あ a (আ)","い i (ই)","う u (উ*)","え e (এ)","お o (ও)"],["K","か ka (কা)","き ki (কি)","く ku (কু)","け ke (কে)","こ ko (কো)"],["S","さ sa (সা)","し **shi** (শি)","す su (সু)","せ se (সে)","そ so (সো)"],["T","た ta (তা)","ち **chi** (চি)","つ **tsu** (ৎসু*)","て te (তে)","と to (তো)"],["N","な na (না)","に ni (নি)","ぬ nu (নু)","ね ne (নে)","の no (নো)"],["H","は ha (হা)","ひ hi (হি)","ふ **fu** (ফু*)","へ he (হে)","ほ ho (হো)"],["M","ま ma (মা)","み mi (মি)","む mu (মু)","め me (মে)","も mo (মো)"],["Y","や ya (ইয়া)","—","ゆ yu (ইউ)","—","よ yo (ইয়ো)"],["R","ら ra (রা*)","り ri (রি)","る ru (রু)","れ re (রে)","ろ ro (রো)"],["W","わ wa (ওয়া)","—","—","—","を (w)o — শুধু particle"],["—","ん n (ং/ন)","","","",""]]},{"t":"p","c":"তারা(*) দেওয়াগুলো উচ্চারণ trap এ আছে নিচে। Bold করা し・ち・つ・ふ — এই চারটা row এর pattern ভাঙে, এগুলো আলাদা করে মনে রাখো।"},{"t":"p","c":"**দাকুতেন ゛ — দুই ফোঁটায় sound ভারী হয়:** か(ka)→が(ga) · さ(sa)→ざ(za) · た(ta)→だ(da) · は(ha)→ば(ba) পুরো set: が ぎ ぐ げ ご / ざ じ ず ぜ ぞ / だ ぢ づ で ど / ば び ぶ べ ぼ"},{"t":"p","c":"**হান্দাকুতেন ゜ — ছোট গোল্লায় প:** ぱ ぴ ぷ ぺ ぽ (pa pi pu pe po)"},{"t":"p","c":"**ছোট っ (sokuon) — বাংলার যুক্ত-ধ্বনি:** পরের consonant টা double হয়ে যায়। きって (kitte, ডাকটিকিট) = কিত্তে। বাংলায় \"চাক্কা\" যেভাবে বলো — ঠিক সেই থেমে-যাওয়া টা। এটা তোমার জন্য পানির মতো সহজ, English-ভাষীরা এটায় কষ্ট পায়।"},{"t":"p","c":"**ছোট ゃゅょ (yōon):** い-column অক্ষর + ছোট や/ゆ/よ = এক syllable। き+ゃ = きゃ (kya, ক্যা)। যেমন: とうきょう (Toukyou) = とう-きょう, চার ভাগ না — তিন ভাগ।"},{"t":"p","c":"**লম্বা vowel — জাপানির সবচেয়ে জরুরি সূক্ষ্মতা:** おばさん (obasan, আন্টি) আর おばあさん (obaasan, দাদি/নানি) — মাঝের あ টা লম্বা টানলে অর্থই বদলে যায়। বাংলায় আমরা vowel এর দৈর্ঘ্য নিয়ে অত ভাবি না, তাই এটা **সচেতনভাবে** practice করতে হবে। Rule: あ+あ, い+い, う+う টানা পড়ো; え-এর লম্বা রূপ সাধারণত え+い (せんせい = সেন্সেই), お-এর লম্বা রূপ সাধারণত お+う (とうきょう)।"},{"t":"h","c":"🗣️ উচ্চারণ trap (বাংলাভাষী special)"},{"t":"li","c":"**う** — ঠোঁট গোল না করে বলো। বাংলা \"উ\" তে ঠোঁট গোল হয়, জাপানি う তে ঠোঁট প্রায় flat থাকে। আয়নার সামনে বলে দেখো।"},{"t":"li","c":"**つ (tsu)** — বাংলায় এই sound নেই, ৯০% বাংলাদেশি এটাকে \"চু\" বা \"সু\" বলে ফেলে। Trick: \"ৎ\" + \"সু\" জোড়া লাগাও — \"ইৎসু\" বলার মতো করে। つくえ (tsukue, টেবিল) ≠ চুকুয়ে।"},{"t":"li","c":"**ふ (fu)** — এটা বাংলা \"ফ\" না (দাঁত-ঠোঁটের ঘষা না)। দুই ঠোঁট প্রায় বন্ধ করে মোমবাতি নেভানোর মতো ফুঁ দাও — সেই sound। ふじさん (Fujisan, Mount Fuji)।"},{"t":"li","c":"**ら行 (ra ri ru re ro)** — বাংলা \"র\" এর চেয়ে নরম, \"ড়\" এর কাছাকাছি এক টোকার sound। জিভ একবার উপরে ঠেকিয়ে ছেড়ে দাও।"},{"t":"li","c":"**ん** — পরের sound অনুযায়ী রূপ বদলায় (ন/ম/ং)। せんぱい তে \"সেম্পাই\" এর মতো শোনায় — এটা ভুল না, এটাই নিয়ম।"},{"t":"h","c":"⚠️ ভুল যেখানে হয়"},{"t":"p","c":"1. **は আর わ:** particle হিসেবে は পড়া হয় \"wa\"। こんにちは = konnichi**wa**। লেখায় は, মুখে わ। (Particle মানে কী — Ch.4 এ আসছে, এখন শুধু চেহারাটা চেনো।) 2. **を:** শুধু particle হিসেবে ব্যবহার হয়, পড়া হয় \"o\"। 3. **শ আর স গুলিয়ে ফেলা:** し = শি (স-ই না)। すし = সুশি, শুসি না। 4. **Stroke order কে অবহেলা:** নিজের মতো আঁকলে পরে দ্রুত লেখায় অক্ষর ভেঙে যায়। App এর Write screen এ প্রতিটা অক্ষরের stroke animation আছে — ওটাই follow করো।"},{"t":"h","c":"🏮 Culture corner"},{"t":"p","c":"জাপানে হাতের লেখা এখনো অনেক জায়গায় লাগে — ভিসার ফর্ম, কাজের 日報 (daily report), দোকানের রসিদে নাম। সুন্দর না হোক, **সঠিক stroke order** এ লেখা অক্ষর জাপানিরা এক নজরে চেনে। উল্টো order এ \"ছবি আঁকা\" অক্ষর তাদের চোখে সাথে সাথে ধরা পড়ে।"},{"t":"h","c":"✍️ অনুশীলন"},{"t":"p","c":"**A (চেনা):** পড়ো — ৯টা শব্দ, সবগুলো তুমি এখন পারো: ১. あさ (সকাল) ২. いぬ (কুকুর) ৩. うみ (সমুদ্র) ৪. かさ (ছাতা) ৫. みず (পানি) ৬. ねこ (বিড়াল) ৭. きって (ডাকটিকিট) ৮. がっこう (স্কুল) ৯. きょう (আজ) **B (লেখা):** নিজের নাম হিরাগানায় লিখতে চেষ্টা করো (মজার জন্য — নাম আসলে কাতাকানায় লেখা হয়, Ch.2 তে ঠিক করে নেবে)। **C (খেলা):** রাস্তার যেকোনো জাপানি brand নাম নাও (Toyota, Honda, Suzuki) — হিরাগানায় ভাঙো: と-よ-た, ほ-ん-だ, す-ず-き। *(উত্তর: Appendix J)*"},{"t":"h","c":"📦 SRS words"},{"t":"p","c":"あさ・いぬ・うみ・かさ・みず・ねこ・きって・がっこう・きょう + পুরো ৪৬ অক্ষর recognition cards"},{"t":"h","c":"☑️ Self-check"},{"t":"li","c":"[ ] Chart না দেখে ৪৬টা হিরাগানা পড়তে পারি"},{"t":"li","c":"[ ] っ থাকা শব্দ ঠিকমতো (থেমে) বলতে পারি"},{"t":"li","c":"[ ] লম্বা vowel (おばあさん) আর ছোট vowel (おばさん) আলাদা শুনতে পারি"},{"t":"li","c":"[ ] は কখন \"wa\" পড়তে হয় জানি"}]},{"id":"ch2","num":2,"title":"কাতাকানা (カタカナ)","part":"PART 0 — লিপি Foundation","blocks":[{"t":"p","c":"`unit: L0.2 · level: L0 · আগে লাগবে: Ch.1 · app lesson: katakana`"},{"t":"h","c":"🎯 এই chapter শেষে"},{"t":"li","c":"৪৬টা কাতাকানা পড়তে ও লিখতে পারবে"},{"t":"li","c":"নিজের নাম আর দেশের নাম কাতাকানায় লিখতে পারবে"},{"t":"li","c":"দোকান/menu/label এ বিদেশি শব্দ চিনতে পারবে"},{"t":"h","c":"🎬 Scene"},{"t":"p","c":"টোকিওর কনবিনিতে ঢুকলে — チキン (chicken), コーヒー (coffee), アイス (ice cream)। জাপানে গিয়ে প্রথম যে লিপিটা সবচেয়ে বেশি চোখে পড়বে, সেটা আসলে কাতাকানা — কারণ modern জীবনের অর্ধেক শব্দই বিদেশি। কাতাকানা পারা মানে জাপানের অর্ধেক menu এমনিই পড়ে ফেলা।"},{"t":"h","c":"📖 The System"},{"t":"p","c":"Sound গুলো হিরাগানার হুবহু same — শুধু চেহারা আলাদা (সোজা, কোণাওয়ালা লাইন)। পুরো chart:"},{"t":"table","rows":[["Row","ア-col","イ","ウ","エ","オ"],["—","ア a","イ i","ウ u","エ e","オ o"],["K","カ ka","キ ki","ク ku","ケ ke","コ ko"],["S","サ sa","シ shi","ス su","セ se","ソ so"],["T","タ ta","チ chi","ツ tsu","テ te","ト to"],["N","ナ na","ニ ni","ヌ nu","ネ ne","ノ no"],["H","ハ ha","ヒ hi","フ fu","ヘ he","ホ ho"],["M","マ ma","ミ mi","ム mu","メ me","モ mo"],["Y","ヤ ya","—","ユ yu","—","ヨ yo"],["R","ラ ra","リ ri","ル ru","レ re","ロ ro"],["W","ワ wa","—","—","—","ヲ (w)o"],["—","ン n","","","",""]]},{"t":"p","c":"দাকুতেন/হান্দাকুতেন/ছোট ッ/ছোট ャュョ — সব নিয়ম হিরাগানার মতোই। **নতুন জিনিস মাত্র একটা:** লম্বা vowel এখানে একটা টান দিয়ে লেখা হয় — **ー**। コーヒー (koohii, coffee) — দুটো টান দেখছ?"},{"t":"p","c":"**বিদেশি sound এর জন্য extra combination:** ファ (fa) フィ (fi) フェ (fe) フォ (fo) · ティ (ti) ディ (di) · ヴ (vu) · ウィ (wi) ウェ (we)। যেমন: ファン (fan), パーティー (party)।"},{"t":"h","c":"📖 নিজের নাম লেখো — step by step"},{"t":"p","c":"জাপানি syllable system এ বাংলা নাম ভাঙতে হয়। নিয়ম: প্রতিটা consonant এর সাথে vowel লাগবে (ন্ ছাড়া)।"},{"t":"table","rows":[["বাংলা নাম","ভাঙা","কাতাকানা"],["রাকিব","রা-কি-বু","ラキブ"],["শান্ত","শা-ন-তো","シャント"],["সুমাইয়া","সু-মা-ই-য়া","スマイヤ"],["নুসরাত","নু-সু-রা-তো","ヌスラト"],["বাংলাদেশ","বা-ন-গু-রা-দে-শু","バングラデシュ"],["ঢাকা","দা-ক্কা","ダッカ"]]},{"t":"p","c":"খেয়াল করো: শেষের ব/ত এর মতো একলা consonant এ একটা উ/ও vowel যোগ হয় (বু, তো) — জাপানি মুখে একলা consonant বসে না, ঠিক যেমন বাংলার নিয়মে \"school\" হয়ে যায় \"ইস্কুল\"। দুই ভাষাই cluster ভাঙে — শুধু কৌশল আলাদা!"},{"t":"h","c":"🗣️ উচ্চারণ trap"},{"t":"li","c":"**シ (shi) vs ツ (tsu) vs ソ (so) vs ン (n)** — চেহারা প্রায় এক, নতুনদের দুঃস্বপ্ন। মনে রাখার trick: シ আর ン এর ছোট দাগগুলো **আড়াআড়ি/নিচ থেকে**, ツ আর ソ এর দাগ **উপর থেকে খাড়া** নামে। শি-ন জোড়া (হেলানো), ৎসু-সো জোড়া (খাড়া)।"},{"t":"li","c":"**ー টান** — কাতাকানায় লম্বা vowel skip করলে অন্য শব্দ হয়ে যায়: ビル (biru, building) vs ビール (biiru, beer)। কোনটা অর্ডার করছ সাবধান!"},{"t":"h","c":"⚠️ ভুল যেখানে হয়"},{"t":"p","c":"1. বিদেশি শব্দ \"English এর মতো\" পড়া: テレビ পড়তে হবে te-re-bi, \"television\" না। কাতাকানা শব্দ জাপানি শব্দ — English এর নিয়মে না। 2. নিজের নামে vowel বসাতে ভুলে যাওয়া: \"Rakib\" → ラキブ (ra-ki-bu), ラキব লেখা যায় না — খালি \"b\" এর অক্ষরই নেই।"},{"t":"h","c":"🏮 Culture corner"},{"t":"p","c":"কাজের জায়গায় তোমার নাম tag, shift schedule, locker — সব জায়গায় নাম থাকবে কাতাকানায়। Interview এর আগেই নিজের নামের কাতাকানা বানান ঠিক করে ফেলো আর **একভাবেই** লেখো সবসময় — জাপানে নামের বানান বদলালে কাগজপত্রে ঝামেলা হয়।"},{"t":"h","c":"✍️ অনুশীলন"},{"t":"p","c":"**A:** পড়ো: ১. コーヒー ২. テレビ ৩. バス ৪. カレー ৫. アイス ৬. コンビニ ৭. スマホ ৮. トイレ **B:** কাতাকানায় লেখো: নিজের নাম, বাবার নাম, নিজের জেলা। **C:** Match করো: パン・ミルク・ジュース ↔ দুধ・রুটি・জুস *(উত্তর: Appendix J)*"},{"t":"h","c":"📦 SRS words"},{"t":"p","c":"コーヒー・テレビ・バス・カレー・アイス・コンビニ・スマホ・トイレ・パン・ミルク + ৪৬ অক্ষর recognition"},{"t":"h","c":"☑️ Self-check"},{"t":"li","c":"[ ] Menu/label এ কাতাকানা শব্দ পড়তে পারি"},{"t":"li","c":"[ ] নিজের নাম না দেখে লিখতে পারি"},{"t":"li","c":"[ ] シ/ツ/ソ/ン আলাদা করতে পারি"}]},{"id":"ch3","num":3,"title":"সংখ্যা, দাম, সময়","part":"PART 0 — লিপি Foundation","blocks":[{"t":"p","c":"`unit: L0.3 · level: L0 · আগে লাগবে: Ch.1 · app lessons: numbers_01, time_01`"},{"t":"h","c":"🎯 এই chapter শেষে"},{"t":"li","c":"১ থেকে ৯৯,৯৯৯ পর্যন্ত গুনতে পারবে (হ্যাঁ, সত্যিই — system টা জানলে এটা সহজ)"},{"t":"li","c":"দাম জিজ্ঞেস করতে ও বুঝতে পারবে (円 yen)"},{"t":"li","c":"ঘড়ির সময় আর সপ্তাহের বার বলতে পারবে"},{"t":"h","c":"🎬 Scene"},{"t":"p","c":"কনবিনির ক্যাশে দাঁড়িয়ে আছ। Screen এ উঠল: ৪৮০。ক্যাশিয়ার বলল কিছু একটা খুব দ্রুত — よんひゃくはちじゅうえんです। বুঝলে না বলে ঘাবড়ে গেলে? এই chapter এর পরে আর হবে না।"},{"t":"h","c":"📖 শব্দ — মূল সংখ্যা"},{"t":"table","rows":[["সংখ্যা","জাপানি","Romaji","মনে রাখার সুতো"],["১","いち","ichi","—"],["২","に","ni","—"],["৩","さん","san","—"],["৪","よん / し","yon / shi","সাধারণত よん"],["৫","ご","go","—"],["৬","ろく","roku","—"],["৭","なな / しち","nana / shichi","সাধারণত なな"],["৮","はち","hachi","—"],["৯","きゅう / く","kyuu / ku","সাধারণত きゅう"],["১০","じゅう","juu","—"],["১০০","ひゃく","hyaku","—"],["১,০০০","せん","sen","—"],["১০,০০০","まん","man","★ নিচে দেখো"]]},{"t":"p","c":"**System টা বাংলার চেয়েও সোজা:** ১১ = ১০+১ = じゅういち। ২৫ = ২×১০+৫ = にじゅうご। ৩৬৭ = さんびゃくろくじゅうなな। বাংলায় আমাদের \"পঁচিশ, ছাব্বিশ, সাতাশ\" আলাদা আলাদা মুখস্থ করতে হয় — জাপানিতে শুধু formula। ৯৯ পর্যন্ত নতুন শব্দ লাগবে মাত্র ১১টা।"},{"t":"p","c":"**★ まん (১০,০০০) — একমাত্র নতুন concept:** জাপানিরা লাখ-কোটি গোনে না, গোনে まん (দশ হাজার) দিয়ে। ১ লাখ = ১০まん (じゅうまん)। বেতনের কথায় আসবে: মাসে ১৮まん円 মানে ১,৮০,০০০ ইয়েন।"},{"t":"p","c":"**Sound বদলের ৩টা জায়গা (মুখস্থ):** ৩০০ = さんびゃく (b!) · ৬০০ = ろっぴゃく (pp!) · ৮০০ = はっぴゃく · ৩,০০০ = さんぜん (z!) · ৮,০০০ = はっせん।"},{"t":"h","c":"📖 দাম ও কেনাকাটা (app এর verified phrases)"},{"t":"table","rows":[["জাপানি","Romaji","বাংলা"],["これはいくらですか","kore wa ikura desu ka","এটার দাম কত?"],["よんひゃくはちじゅうえんです","yonhyaku hachijuu en desu","৪৮০ ইয়েন"],["ふくろはいりますか","fukuro wa irimasu ka","ব্যাগ লাগবে? (ক্যাশিয়ার জিজ্ঞেস করবে)"],["いりません","irimasen","লাগবে না"]]},{"t":"h","c":"📖 সময় ও বার"},{"t":"p","c":"ঘণ্টা = সংখ্যা + じ (ji): ১টা = いちじ · ৩টা = さんじ · ৯টা = **く**じ (きゅうじ না!) · ৪টা = **よ**じ। মিনিট = সংখ্যা + ふん/ぷん: ৫ মিনিট = ごふん · ১০ মিনিট = じゅっぷん · সাড়ে = はん (৩:৩০ = さんじはん)।"},{"t":"table","rows":[["জাপানি","Romaji","বাংলা"],["いまなんじですか","ima nanji desu ka","এখন কটা বাজে?"],["ごぜん / ごご","gozen / gogo","AM / PM"]]},{"t":"p","c":"বার: 月 げつようび (সোম) · 火 かようび (মঙ্গল) · 水 すいようび (বুধ) · 木 もくようび (বৃহস্পতি) · 金 きんようび (শুক্র) · 土 どようび (শনি) · 日 にちようび (রবি)। মনে রাখার সুতো: চাঁদ-আগুন-পানি-গাছ-সোনা-মাটি-সূর্য — গ্রহদের নাম, বাংলার সোম(চাঁদ)-মঙ্গল(গ্রহ) এর মতোই মহাকাশ থেকে ধার করা!"},{"t":"h","c":"🗣️ উচ্চারণ trap"},{"t":"li","c":"じゅう (১০) vs じゆう (স্বাধীনতা) — ছোট ゅ আর বড় ゆ। প্রথমটা এক syllable (জু-উ), দ্বিতীয়টা দুই (জি-ইউ)।"},{"t":"li","c":"４টা আর ৯টা বাজে: よじ, くじ — এখানে よん/きゅう বললে জাপানিরা বুঝবে, কিন্তু ভুল ধরবে।"},{"t":"h","c":"⚠️ ভুল যেখানে হয়"},{"t":"p","c":"1. **০ বলতে হলে:** ゼロ বা れい — দুটোই চলে, ফোন নম্বরে ゼロ বেশি। 2. **টাকার অঙ্ক শুনে হিমশিম:** ক্যাশিয়ার দ্রুত বলবে — but screen এ সবসময় লেখা থাকে। শোনার practice করো, কিন্তু আটকে গেলে screen দেখো, লজ্জার কিছু নেই।"},{"t":"h","c":"🏮 Culture corner"},{"t":"p","c":"জাপানে দাম প্রায় সবসময় ট্যাক্স-সহ (税込 zeikomi) আর ট্যাক্স-ছাড়া (税抜 zeinuki) দুইভাবে লেখা থাকে। ছোট করে লেখা বড় সংখ্যাটাই আসল — অর্থাৎ যেটা দেবে। আর জাপানে দামাদামি নেই (electronics দোকান ছাড়া) — কনবিনিতে দর কষলে ক্যাশিয়ার হাসবে শুধু।"},{"t":"h","c":"✍️ অনুশীলন"},{"t":"p","c":"**A:** জাপানিতে বলো: ১৭, ৪২, ৩৬৫, ৯৯০, ৫,০০০, ২০,০০০ **B:** বলো: \"এখন ৪:৩০\" · \"এটার দাম কত?\" · \"৮৮০ ইয়েন\" **C:** নিজের ফোন নম্বর জাপানি সংখ্যায় বলো। *(উত্তর: Appendix J)*"},{"t":"h","c":"📦 SRS words"},{"t":"p","c":"いち〜じゅう・ひゃく・せん・まん・えん・いくら・これはいくらですか・いまなんじですか・ごぜん・ごご・〜じ・〜ようび (৭ বার)"},{"t":"h","c":"☑️ Self-check"},{"t":"li","c":"[ ] যেকোনো ৩-অঙ্কের সংখ্যা জাপানিতে বলতে পারি"},{"t":"li","c":"[ ] দাম জিজ্ঞেস করতে ও শুনে বুঝতে পারি"},{"t":"li","c":"[ ] ঘড়ি দেখে সময় বলতে পারি"},{"t":"h","c":"প্রথম কথাগুলো — যা দিয়ে জাপানে প্রথম সপ্তাহ চলে যাবে"},{"t":"p","c":"এই part এর চারটা chapter শেষ করলে তুমি: মানুষকে greet করতে, নিজের পরিচয় দিতে, দোকানে কিনতে আর restaurant এ order করতে পারবে। মানে — জাপানে নেমে প্রথম যে situation গুলোয় পড়বে, সবগুলো। Irodori Starter এর core এটাই।"}]},{"id":"ch4","num":4,"title":"Greetings ও নিজের পরিচয়","part":"PART 1 — Survival Japanese (A1)","blocks":[{"t":"p","c":"`unit: A1.1 · level: A1 · আগে লাগবে: Ch.1 · app lessons: work_intro_01, lesson_greetings`"},{"t":"h","c":"🎯 এই chapter শেষে"},{"t":"li","c":"দিনের যেকোনো সময়ের greeting বলতে পারবে"},{"t":"li","c":"কর্মস্থলে নিজের পরিচয় দিতে পারবে (জাপানি স্টাইলে, মাথা নোয়ানো সহ)"},{"t":"li","c":"জীবনের প্রথম জাপানি grammar: 〜は〜です"},{"t":"h","c":"🎬 Scene"},{"t":"p","c":"Narita airport থেকে সোজা company dormitory। পরদিন সকালে factory floor এ supervisor তোমাকে সবার সামনে দাঁড় করিয়ে দিলেন। বিশটা জাপানি মুখ তোমার দিকে তাকিয়ে। এই মুহূর্তটার জন্যই এই chapter।"},{"t":"h","c":"📖 শব্দ — দিনভর greetings (app এর verified set)"},{"t":"table","rows":[["জাপানি","Romaji","বাংলা","কখন"],["おはようございます","ohayou gozaimasu","সুপ্রভাত (ভদ্রভাবে)","দিনের প্রথম দেখায় ★"],["こんにちは","konnichiwa","নমস্কার / শুভ দুপুর","দুপুর-বিকেল"],["こんばんは","konbanwa","শুভ সন্ধ্যা","সন্ধ্যার পরে"],["ありがとうございます","arigatou gozaimasu","ধন্যবাদ (ভদ্রভাবে)","সবসময়"],["すみません","sumimasen","মাফ করবেন / এই যে শুনুন","★★ জাদু-শব্দ"],["おねがいします","onegai shimasu","অনুগ্রহ করে / please","অনুরোধে"],["はじめまして","hajimemashite","প্রথম পরিচয়ে","জীবনে একবারই, প্রতি মানুষে"],["おつかれさまです","otsukaresama desu","আপনার পরিশ্রমের স্বীকৃতি","কর্মস্থলের সর্বজনীন greeting ★"],["さようなら","sayounara","বিদায়","লম্বা বিদায়ে"],["おやすみなさい","oyasuminasai","শুভরাত্রি","ঘুমের আগে"]]},{"t":"p","c":"★ **কর্মস্থলের গোপন নিয়ম:** おはようございます মানে আক্ষরিক \"সুপ্রভাত\", কিন্তু জাপানি workplace এ দিনের **প্রথম দেখায়** এটা বলা হয় — এমনকি তোমার shift বিকেল ৫টায় শুরু হলেও! আর おつかれさまです হলো কাজের জায়গার all-purpose greeting — corridor এ colleague পাশ দিয়ে গেলে, কেউ কাজ শেষ করে বেরোলে — সবসময় এটা।"},{"t":"p","c":"★★ すみません তিনটা কাজ করে: (১) sorry (২) excuse me — কাউকে ডাকতে (৩) thank you — কেউ কষ্ট করে কিছু করে দিলে। সন্দেহ হলে すみません বলো — জাপানে এটা কখনো ভুল হয় না।"},{"t":"h","c":"🧩 Grammar core"},{"t":"p","c":"**১. জীবনের প্রথম জাপানি sentence: AはBです**"},{"t":"q","c":"わたし**は** ラキブ**です**。 (watashi wa Rakibu desu) — আমি রাকিব।"},{"t":"p","c":"ভাঙো: わたし (আমি) + は (topic marker — \"যার কথা বলছি\") + ラキブ (রাকিব) + です (হই/হয়)। বাংলার সাথে মেলাও: \"আমি **তো** রাকিব\" — এই \"তো\" টা যেমন বোঝায় কার কথা হচ্ছে, は ঠিক সেটাই। আর です? বাংলা \"হই\" প্রায়ই উহ্য থাকে (\"আমি রাকিব\") — জাপানিতে です টা বলা হয়, polite ভাব আনে। মনে আছে Ch.1 এর নিয়ম — **particle হিসেবে は পড়া হয় \"wa\"।** এখন বুঝলে কেন ওটা আগেই শিখিয়েছি।"},{"t":"p","c":"**২. দেশ + জন = জাতীয়তা:**"},{"t":"q","c":"わたしは バングラデシュじん です。 — আমি বাংলাদেশি।"},{"t":"p","c":"じん (人) = মানুষ। বাংলাদেশ+জিন, にほん+じん (জাপানি)। খেয়াল করো — বাংলা \"জন\" আর জাপানি じん... উচ্চারণও কাছাকাছি, কাজও এক। মনে রাখতে কষ্ট হবে না।"},{"t":"p","c":"**৩. Self-intro র full formula (মুখস্থ করার মতো একটা set):**"},{"t":"q","c":"はじめまして。わたしは [নাম] です。バングラデシュから きました。よろしくおねがいします。"},{"t":"q","c":"(Hajimemashite. Watashi wa [নাম] desu. Banguradeshu kara kimashita. Yoroshiku onegai shimasu.)"},{"t":"q","c":"— প্রথম পরিচয়। আমি [নাম]। বাংলাদেশ থেকে এসেছি। আপনার সাহায্য/সুবিবেচনা প্রত্যাশা করি।"},{"t":"p","c":"শেষ লাইনটার (よろしくおねがいします) কোনো বাংলা বা English translation নেই — মানে \"আজ থেকে আমাদের সম্পর্ক শুরু, আমাকে দেখবেন\"। জাপানি সমাজের সবচেয়ে গুরুত্বপূর্ণ sentence। Interview, নতুন団地, নতুন team — সব জায়গায় শেষ কথা এটাই।"},{"t":"h","c":"💬 Dialogue — factory floor এ প্রথম সকাল"},{"t":"q","c":"**リーダー:** みなさん、おはようございます。あたらしい ひと です。"},{"t":"q","c":"*(সবাই, সুপ্রভাত। নতুন মানুষ [এসেছে]।)*"},{"t":"q","c":"**তুমি:** はじめまして。わたしは ラキブ です。バングラデシュから きました。よろしくおねがいします。 *(+ মাথা নোয়াও)*"},{"t":"q","c":"**みんな:** よろしくおねがいします!"},{"t":"q","c":"*(পরে corridor এ senior এর সাথে দেখা—)*"},{"t":"q","c":"**তুমি:** おつかれさまです。"},{"t":"q","c":"**せんぱい:** おつかれさま!"},{"t":"h","c":"🗣️ উচ্চারণ trap"},{"t":"li","c":"おはよう**ございます** — গোজাইমাসু, শেষের す প্রায় শোনা যায় না: \"গোজাইমাস্\"। জাপানিরা শব্দশেষের う প্রায়ই গিলে ফেলে (একে বলে devoicing)। です = \"দেস্\", します = \"শিমাস্\"।"},{"t":"li","c":"ありがとう — বাংলাদেশে অনেকে বলে \"আরিগাতো**উ**\" জোর দিয়ে। আসলে শেষটা নরম লম্বা টান: আরিগাতোː।"},{"t":"li","c":"ら in よろしく — নরম ড়/র টোকা, \"ইয়োরোশিকু\" দ্রুত বললে \"ইয়োরোশ্কু\"।"},{"t":"h","c":"⚠️ ভুল যেখানে হয়"},{"t":"p","c":"1. দুপুর ২টার shift এ ঢুকে こんにちは বলা — সহকর্মীরা おはようございます বলবে। নিয়ম: **দিনের প্রথম দেখা = おはよう**, সময় যাই হোক। 2. はじめまして একই মানুষকে দ্বিতীয়বার বলা — এটা শুধু জীবনের প্রথম পরিচয়ে। 3. わたしは**です** ラキブ — verb-জাতীয় জিনিস (です) সবসময় **শেষে**। বাংলার মতোই: \"আমি রাকিব **হই**\" — \"আমি হই রাকিব\" বলো না তো!"},{"t":"h","c":"🏮 Culture corner — おじぎ (মাথা নোয়ানো)"},{"t":"p","c":"জাপানে handshake না — おじぎ। তিন level: হালকা ১৫° (রোজকার greeting), ৩০° (প্রথম পরিচয়, ধন্যবাদ), গভীর ৪৫° (ক্ষমা, বড় অনুরোধ)। Self-intro র সময় よろしくおねがいします বলার **সাথে সাথে** ৩০° নোয়াও — কথা আর bow একসাথে গেলে perfect। চোখে চোখ রেখে কথা বলা বাংলাদেশে ভদ্রতা, জাপানে টানা eye contact একটু aggressive লাগে — মাঝে মাঝে চোখ নামাও, এটাই ওদের ভদ্রতা।"},{"t":"h","c":"✍️ অনুশীলন"},{"t":"p","c":"**A:** কোন situation এ কী বলবে? — (১) সকাল ৭টায় supervisor কে (২) রাত ১০টায় dorm এ roommate ঘুমাতে যাচ্ছে (৩) কেউ তোমার জন্য দরজা ধরে রাখল (৪) কাজ শেষে সবাই বেরোচ্ছ **B:** নিজের full self-intro লেখো ও মুখে বলো — নাম + দেশ + よろしく। ৩ বার আয়নার সামনে, bow সহ। **C:** Word-block সাজাও: [です・わたし・ラキブ・は] → সঠিক sentence। *(উত্তর: Appendix J)*"},{"t":"h","c":"📦 SRS words"},{"t":"p","c":"おはようございます・こんにちは・こんばんは・ありがとうございます・すみません・おねがいします・はじめまして・おつかれさまです・さようなら・おやすみなさい・わたし・〜じん・よろしくおねがいします"},{"t":"h","c":"☑️ Self-check"},{"t":"li","c":"[ ] না ভেবে দিনের সঠিক greeting মুখে চলে আসে"},{"t":"li","c":"[ ] Full self-intro bow সহ দিতে পারি"},{"t":"li","c":"[ ] は কেন \"wa\" আর কী কাজ করে, কাউকে বুঝিয়ে বলতে পারি"}]},{"id":"ch5","num":5,"title":"নাম, দেশ, কাজ","part":"PART 1 — Survival Japanese (A1)","blocks":[{"t":"p","c":"`unit: A1.2 · level: A1 · আগে লাগবে: Ch.4 · app lesson: (authoring pending — বইয়ে full material)`"},{"t":"h","c":"🎯 এই chapter শেষে"},{"t":"li","c":"কারো নাম/দেশ/পেশা জিজ্ঞেস করতে পারবে ও নিজেরটা বলতে পারবে"},{"t":"li","c":"Question বানানো শিখবে (か lagালেই প্রশ্ন!)"},{"t":"li","c":"の দিয়ে সম্পর্ক বোঝানো (আমার নাম, কোম্পানির লোক)"},{"t":"h","c":"🎬 Scene"},{"t":"p","c":"Dorm এর common room। ভিয়েতনাম, ইন্দোনেশিয়া, নেপালের ছেলেরাও আছে — সবার common ভাষা ভাঙা জাপানি। একজন জিজ্ঞেস করল: おなまえは? এখন কথা এগোবে কীভাবে — সেটাই এই chapter।"},{"t":"h","c":"📖 শব্দ"},{"t":"table","rows":[["জাপানি","Romaji","বাংলা"],["おなまえは?","onamae wa?","আপনার নাম?"],["おくにはどちらですか","okuni wa dochira desu ka","আপনার দেশ কোথায়?"],["おしごとはなんですか","oshigoto wa nan desu ka","আপনার কাজ কী?"],["かいしゃいん","kaishain","কোম্পানির কর্মী"],["ぎのうじっしゅうせい","ginou jisshuusei","technical intern (TITP)"],["とくていぎのう","tokutei ginou","SSW (বিশেষ দক্ষতা) কর্মী"],["こうじょう","koujou","কারখানা"],["かいごし","kaigoshi","care worker"],["りゅうがくせい","ryuugakusei","বিদেশি student"],["せんせい","sensei","শিক্ষক"],["〜さん","~san","নামের পরে সম্মানসূচক ★"]]},{"t":"p","c":"★ **さん — জাপানের \"ভাই/আপা/সাহেব\" সব একসাথে।** অন্যের নামের পরে সবসময়: タナカさん। **নিজের নামে কখনো না** — わたしはラキブさんです বললে জাপানিরা মুচকি হাসবে (নিজেকে নিজে \"রাকিব সাহেব\" বলার মতো শোনায়)।"},{"t":"h","c":"🧩 Grammar core"},{"t":"p","c":"**১. Question = sentence + か。 এটুকুই।**"},{"t":"q","c":"あなたは バングラデシュじんです。 → あなたは バングラデシュじんです**か**。"},{"t":"q","c":"(তুমি বাংলাদেশি। → তুমি কি বাংলাদেশি?)"},{"t":"p","c":"বাংলায় প্রশ্ন করতে \"কি\" বসাই মাঝে — জাপানিতে か বসে **শেষে**। Word order পাল্টায় না, English এর মতো \"Are you...\" উল্টাতে হয় না। আবার তোমার advantage।"},{"t":"p","c":"**২. উত্তর: はい / いいえ**"},{"t":"q","c":"はい、そうです。 (হ্যাঁ, তাই।) · いいえ、ちがいます。 (না, তা না।)"},{"t":"p","c":"**৩. の — বাংলার \"র/এর\"**"},{"t":"q","c":"わたし**の** なまえ (আমার নাম) · かいしゃ**の** ひと (কোম্পানির লোক) · バングラデシュ**の** りょうり (বাংলাদেশের রান্না)"},{"t":"p","c":"বাংলা: আমা**র** নাম। জাপানি: わたし**の** なまえ। গঠন হুবহু এক — [মালিক] + এর/の + [জিনিস]। English এর of-উল্টানো (\"name of mine\") ঝামেলাই নেই।"},{"t":"p","c":"**৪. どちら / どこ (কোথায়) + から (থেকে):**"},{"t":"q","c":"おくには どちらですか。 — দেশ কোথায় (কোনটা)?"},{"t":"q","c":"バングラデシュ**から** きました。 — বাংলাদেশ **থেকে** এসেছি। (から = থেকে; আবার একটা particle যেটা বাংলার মতোই শব্দের পরে বসে)"},{"t":"h","c":"💬 Dialogue — dorm এর আড্ডা"},{"t":"q","c":"**A:** はじめまして。おなまえは?"},{"t":"q","c":"**তুমি:** ラキブです。あなたは?"},{"t":"q","c":"**A:** ミンです。ベトナムから きました。ラキブさんの おくには?"},{"t":"q","c":"**তুমি:** バングラデシュです。ダッカの ちかくです。 *(ঢাকার কাছে)*"},{"t":"q","c":"**A:** おしごとは なんですか。"},{"t":"q","c":"**তুমি:** とくていぎのうです。こうじょうで はたらきます。 *(SSW। কারখানায় কাজ করি।)*"},{"t":"q","c":"**A:** そうですか。よろしく!"},{"t":"h","c":"🗣️ উচ্চারণ trap"},{"t":"li","c":"りゅうがくせい — りゅ (ryu) এক syllable এ: \"রিউ\" না, \"র্যু\"। ভেঙে গেলে りゆう (কারণ) হয়ে যায় — অন্য শব্দ!"},{"t":"li","c":"ぎのう — が-行 এর nasal ঢঙ শুনবে অনেকের মুখে (ŋ) — দুটোই ঠিক, তুমি সোজা গ বলো।"},{"t":"h","c":"⚠️ ভুল যেখানে হয়"},{"t":"p","c":"1. নিজের নামে さん লাগানো (উপরে বললাম — আবার বলছি, কারণ এটা সবাই করে!)। 2. あなた বেশি ব্যবহার: জাপানিতে \"তুমি/আপনি\" শব্দটা প্রায় বলা হয়ই না — নাম জানলে নাম+さん বলো। あなた বারবার বললে রুক্ষ শোনায়। 3. の উল্টে দেওয়া: \"ঢাকার কাছে\" = ダッカの ちかく। ちかくの ダッカ বললে মানে হয়ে যায় \"কাছের ঢাকা\"।"},{"t":"h","c":"🏮 Culture corner"},{"t":"p","c":"জাপানে প্রথম আলাপে দেশ শুনে সবচেয়ে common প্রতিক্রিয়া: カレー! (curry!)। বিরক্ত হয়ো না — এটা আন্তরিকতার চেষ্টা। ভালো comeback: はい!バングラデシュの カレーは からいです よ (হ্যাঁ! বাংলাদেশের ঝোল কিন্তু ঝাল!)। হাসি guaranteed, বন্ধুত্ব শুরু।"},{"t":"h","c":"✍️ অনুশীলন"},{"t":"p","c":"**A:** প্রশ্ন বানাও: (১) [আপনি জাপানি] → জিজ্ঞেস করো (২) [আপনার কাজ] (৩) [আপনার দেশ] **B:** নিজের সম্পর্কে ৪ লাইন: নাম・দেশ・শহর・কাজ। **C:** Word-block: [ですか・なん・おしごと・は] সাজাও। *(উত্তর: Appendix J)*"},{"t":"h","c":"📦 SRS words"},{"t":"p","c":"おなまえ・おくに・おしごと・なん・どちら・から・きました・かいしゃいん・こうじょう・りゅうがくせい・せんせい・〜さん・はい・いいえ・そうです・ちがいます"},{"t":"h","c":"☑️ Self-check"},{"t":"li","c":"[ ] か দিয়ে যেকোনো প্রশ্ন বানাতে পারি"},{"t":"li","c":"[ ] নাম-দেশ-কাজ জিজ্ঞেস ও উত্তর — দুই দিকই পারি"},{"t":"li","c":"[ ] の দিয়ে \"আমার/কোম্পানির/দেশের\" বলতে পারি"}]},{"id":"ch6","num":6,"title":"Konbini ও দোকান","part":"PART 1 — Survival Japanese (A1)","blocks":[{"t":"p","c":"`unit: A1.3 · level: A1 · আগে লাগবে: Ch.3 · app lessons: konbini_01, lesson_shopping`"},{"t":"h","c":"🎯 এই chapter শেষে"},{"t":"li","c":"দোকানে জিনিস চাইতে, দাম জিজ্ঞেস করতে, কিনতে পারবে"},{"t":"li","c":"これ/それ/あれ — \"এটা/সেটা/ওটা\" system"},{"t":"li","c":"ক্যাশিয়ারের প্রশ্নগুলো শুনে বুঝবে (ব্যাগ? গরম করব? পয়েন্ট কার্ড?)"},{"t":"h","c":"🎬 Scene"},{"t":"p","c":"রাত ১১টা, কাজ শেষে খিদে। ভরসা セブンイレブン। জাপানের কনবিনি হলো বাংলাদেশের মুদি দোকান + bKash + ফটোকপি + ATM + খাবার হোটেল — সব এক ঘরে। এটা জয় করলে জাপানের রোজকার জীবন অর্ধেক জয়।"},{"t":"h","c":"📖 শব্দ (app এর verified set + দরকারি extras)"},{"t":"table","rows":[["জাপানি","Romaji","বাংলা"],["これをください","kore o kudasai","এটা দিন"],["これはいくらですか","kore wa ikura desu ka","এটার দাম কত?"],["ふくろはいりますか","fukuro wa irimasu ka","ব্যাগ লাগবে?"],["ふくろをください","fukuro o kudasai","একটা ব্যাগ দিন"],["いりません","irimasen","লাগবে না"],["カードでいいですか","kaado de ii desu ka","কার্ডে দিলে হবে?"],["げんきんでおねがいします","genkin de onegai shimasu","ক্যাশে দেবো"],["レシートをください","reshiito o kudasai","রসিদটা দিন"],["みているだけです","mite iru dake desu","শুধু দেখছি"],["あたためますか","atatamemasu ka","গরম করে দেব?"],["おにぎり","onigiri","ভাতের বল (জাপানি \"খিচুড়ি-মোড়ক\"!)"],["おべんとう","obentou","খাবারের বাক্স"],["おちゃ","ocha","চা"],["みず","mizu","পানি"]]},{"t":"h","c":"🧩 Grammar core"},{"t":"p","c":"**১. これ・それ・あれ — দূরত্বের তিন ধাপ:**"},{"t":"li","c":"これ = এটা (আমার হাতের কাছে)"},{"t":"li","c":"それ = সেটা (তোমার কাছে / ক্যাশিয়ারের পেছনে)"},{"t":"li","c":"あれ = ওটা (দুজনের থেকেই দূরে — উপরের তাকে)"},{"t":"p","c":"বাংলার এটা/সেটা/ওটা প্রায় same তিন-ধাপ! জিজ্ঞেসের রূপ: どれ (কোনটা)। দোকানে আঙুল তুলে それをください বললেই কাজ শেষ।"},{"t":"p","c":"**২. を — object marker:**"},{"t":"q","c":"これ**を** ください。 (এটা**কে** দিন → এটা দিন)"},{"t":"p","c":"বাংলায় \"ভাত**Ø** খাই\" তে object marker উহ্য, কিন্তু \"আমা**কে** ডাকো\" তে কে আছে — জাপানি を সেই জায়গাটাতেই বসে, শুধু সব object এই বসে। পড়া হয় \"o\" (Ch.1 মনে আছে?)।"},{"t":"p","c":"**৩. で — মাধ্যম/উপায়:**"},{"t":"q","c":"カード**で** (কার্ড **দিয়ে**) · げんきん**で** (ক্যাশ **দিয়ে**) · バス**で** (বাস**ে/দিয়ে**)"},{"t":"p","c":"বাংলা \"দিয়ে/-এ\" র কাজ। ক্যাশিয়ার জিজ্ঞেস করবে: おしはらいは? (payment কীভাবে?) — উত্তর: カードで। ব্যস।"},{"t":"p","c":"**৪. 〜をください vs 〜をおねがいします:** দুটোই \"দিন/please\" — ください সরাসরি জিনিস চাওয়ায়, おねがいします একটু নরম ও service চাওয়ায়। দুটো জানলেই চলবে, গুলিয়ে গেলে おねがいします বলো — বেশি polite ভুল কখনো ক্ষতি করে না।"},{"t":"h","c":"💬 Dialogue — কনবিনি counter এ"},{"t":"q","c":"**てんいん (দোকানি):** いらっしゃいませ! *(স্বাগতম! — এর উত্তর দিতে হয় না, হাসলেই হয়)*"},{"t":"q","c":"**তুমি:** *(おべんとう রেখে)* これを おねがいします。"},{"t":"q","c":"**てんいん:** あたためますか。 *(গরম করে দেব?)*"},{"t":"q","c":"**তুমি:** はい、おねがいします。"},{"t":"q","c":"**てんいん:** ふくろは いりますか。"},{"t":"q","c":"**তুমি:** いりません。だいじょうぶです。"},{"t":"q","c":"**てんいん:** ごうけい よんひゃくえんです。 *(মোট ৪০০ ইয়েন)*"},{"t":"q","c":"**তুমি:** *(টাকা tray তে রেখে)* げんきんで。"},{"t":"q","c":"**てんいん:** ありがとうございました!"},{"t":"h","c":"🗣️ উচ্চারণ trap"},{"t":"li","c":"ください — くだ**さ**い, \"কুদাসাই\"। অনেকে বলে \"কুড়াসাই\" — だ টা স্পষ্ট দ।"},{"t":"li","c":"レシート — লম্বা টান: \"রেশীːতো\"। রেশিতো বললে বুঝবে না।"},{"t":"li","c":"いらっしゃいませ শুনে repeat করার দরকার নেই — ওটা একতরফা welcome।"},{"t":"h","c":"⚠️ ভুল যেখানে হয়"},{"t":"p","c":"1. **টাকা হাতে হাতে দেওয়া:** জাপানের কাউন্টারে ছোট tray থাকে — টাকা ওখানে রাখো। হাতে গুঁজে দিলে অস্বস্তিতে পড়বে দোকানি। 2. これ দিয়ে দূরের জিনিস দেখানো — উপরের তাকের জিনিস あれ। 3. だいじょうぶです এর double meaning: \"ঠিক আছে\" আর \"লাগবে না\" দুটোই। ক্যাশিয়ার কিছু offer করলে だいじょうぶです মানে **না, লাগবে না** — বাংলার \"থাক, ঠিক আছে\" র মতোই!"},{"t":"h","c":"🏮 Culture corner"},{"t":"p","c":"কনবিনির খাবার নিয়ে নাক সিঁটকিও না — おにぎり আর おべんとう জাপানি শ্রমিকের রোজকার lunch। Halal নিয়ে চিন্তা থাকলে: শুকনো label এ ぶたにく (শুয়োরের মাংস) শব্দটা চিনে রাখো — Ch.9 এর খাবার-সতর্কতা তালিকায় full list আছে। টুনা (ツナ), স্যামন (サーモン), সবজি (やさい) onigiri সবসময় নিরাপদ side এ।"},{"t":"h","c":"✍️ অনুশীলন"},{"t":"p","c":"**A:** ক্যাশিয়ার বলল: ふくろはいりますか / あたためますか / カードでいいですか — প্রতিটার হ্যাঁ ও না উত্তর দাও। **B:** বলো: \"ওটা কত?\" (দূরের তাক) · \"এটা দিন\" · \"রসিদ দিন\" **C:** Word-block: [ください・を・これ] · [ですか・いくら・は・それ] *(উত্তর: Appendix J)*"},{"t":"h","c":"📦 SRS words"},{"t":"p","c":"これ・それ・あれ・どれ・ください・いくら・ふくろ・いります/いりません・カード・げんきん・レシート・あたためます・おにぎり・おべんとう・おちゃ・みず・だいじょうぶ"},{"t":"h","c":"☑️ Self-check"},{"t":"li","c":"[ ] কনবিনিতে পুরো কেনাকাটা জাপানিতে সারতে পারি"},{"t":"li","c":"[ ] これ/それ/あれ ঠিক জায়গায় বসাতে পারি"},{"t":"li","c":"[ ] ক্যাশিয়ারের ৩টা standard প্রশ্ন শুনে চিনতে পারি"}]},{"id":"ch7","num":7,"title":"Restaurant এ খাওয়া","part":"PART 1 — Survival Japanese (A1)","blocks":[{"t":"p","c":"`unit: A1.4 · level: A1 · আগে লাগবে: Ch.6 · app lesson: restaurant_01`"},{"t":"h","c":"🎯 এই chapter শেষে"},{"t":"li","c":"Menu দেখে/দেখিয়ে খাবার order করতে পারবে"},{"t":"li","c":"সংখ্যা দিয়ে \"দুইটা এটা\" বলতে পারবে (generic counter ひとつ・ふたつ)"},{"t":"li","c":"বিল চাওয়া, খাবারের আগে-পরের রীতি"},{"t":"h","c":"🎬 Scene"},{"t":"p","c":"প্রথম বেতনের দিন। সহকর্মীরা বলল — きょう、しょくどうに いきましょう! (আজ ক্যান্টিনে যাই চলো!)। Menu পুরো জাপানিতে, ছবি অর্ধেক। ভয় নেই — order করার magic phrases মাত্র তিনটা।"},{"t":"h","c":"📖 শব্দ"},{"t":"table","rows":[["জাপানি","Romaji","বাংলা"],["メニューをおねがいします","menyuu o onegai shimasu","Menu টা দিন"],["おすすめはなんですか","osusume wa nan desu ka","আপনার suggestion কী? ★app verified"],["これをひとつください","kore o hitotsu kudasai","এটা একটা দিন"],["おかいけいをおねがいします","okaikei o onegai shimasu","বিলটা দিন"],["いただきます","itadakimasu","(খাওয়া শুরুর কথা) ★"],["ごちそうさまでした","gochisousama deshita","(খাওয়া শেষের কথা) ★"],["おいしいです","oishii desu","মজা / খুব স্বাদ"],["みずをください","mizu o kudasai","পানি দিন"],["ぎゅうどん","gyuudon","গরুর মাংস-ভাত bowl"],["ラーメン","raamen","ramen noodles"],["カレーライス","karee raisu","curry rice (জাপানি স্টাইল)"],["ていしょく","teishoku","set meal (ভাত+তরকারি+স্যুপ)"]]},{"t":"p","c":"★ いただきます / ごちそうさまでした — খাবারের আগে-পরে বলা জাপানি রীতি, আমাদের \"বিসমিল্লাহ\" বলার মতো জায়গা এটার — খাবার ও রাঁধুনির প্রতি কৃতজ্ঞতা। সহকর্মীদের সাথে খেলে বলো — সম্পর্ক এক ধাপ এগোবে।"},{"t":"p","c":"**Generic counter — জাপানের \"টা\":** ひとつ (একটা) ふたつ (দুইটা) みっつ (তিনটা) よっつ (চারটা) いつつ (পাঁচটা)। যেকোনো জিনিসে চলে। বাংলার \"টা\" যেমন — একটা, দুইটা। ঠিক তাই।"},{"t":"h","c":"🧩 Grammar core"},{"t":"p","c":"**১. Order এর universal formula:**"},{"t":"q","c":"[জিনিস] を [সংখ্যা] ください。"},{"t":"q","c":"ぎゅうどんを ひとつ ください。 — গরুর bowl একটা দিন।"},{"t":"p","c":"খেয়াল করো সংখ্যাটা を-র **পরে** বসে — বাংলার মতোই: \"bowl **একটা** দিন\" (আমরাও তো জিনিসের পরে সংখ্যা বলি!)"},{"t":"p","c":"**২. と — এবং (জিনিস জোড়া দিতে):**"},{"t":"q","c":"ラーメン**と** ぎょうざを ください。 — ramen **আর** gyoza দিন।"},{"t":"p","c":"**৩. Restaurant এ ক্রিয়া দুটো আগেই শিখে রাখো (full conjugation Ch.12 তে):**"},{"t":"q","c":"たべます (খাই) · のみます (পান করি)"},{"t":"q","c":"なにを たべますか。 — কী খাবে? (সহকর্মী জিজ্ঞেস করবে)"},{"t":"h","c":"💬 Dialogue — しょくどう তে"},{"t":"q","c":"**তুমি:** すみません、おすすめは なんですか。"},{"t":"q","c":"**てんいん:** きょうは ぎゅうどんが おすすめです。"},{"t":"q","c":"**তুমি:** じゃ、ぎゅうどんを ひとつと、おちゃを ください。"},{"t":"q","c":"**てんいん:** はい!"},{"t":"q","c":"*(খাবার এলো)* **তুমি:** いただきます。 *(খেয়ে)* おいしい!"},{"t":"q","c":"*(শেষে)* **তুমি:** ごちそうさまでした。おかいけいを おねがいします。"},{"t":"p","c":"じゃ = \"তাহলে/আচ্ছা\" — কথার ফাঁকের glue word, জাপানিরা সারাদিন বলে। শিখে নাও, instantly natural শোনাবে।"},{"t":"h","c":"🗣️ উচ্চারণ trap"},{"t":"li","c":"ぎゅうどん — ぎゅ এক ঝটকায়: \"গ্যুː-দোন\", গিউদোন না।"},{"t":"li","c":"ラーメン — \"রাːমেন\", টান না দিলে জাপানি কান শোনে \"রামেন\" ≠ কিছুই।"},{"t":"li","c":"いただきます — শেষটা \"মাস্\" (দেবois করা す আবার)।"},{"t":"h","c":"⚠️ ভুল যেখানে হয়"},{"t":"p","c":"1. Waiter কে ডাকতে হাত তালি / \"boy!\" — জাপানে すみません! বলে ডাকো (একটু জোরে বলা এখানে ভদ্রই)। অনেক দোকানে টেবিলে button ও থাকে। 2. Tips দেওয়া — জাপানে tips নেই। রেখে  বলা হয়, সেটা প্রতিদিন হুবহু এক। মানে: মুখস্থ করে ফেললে প্রতিদিন confident শুরু।"},{"t":"h","c":"📖 শব্দ (app verified + workplace essentials)"},{"t":"table","rows":[["জাপানি","Romaji","বাংলা"],["おつかれさまです","otsukaresama desu","(কাজের সর্বজনীন greeting — Ch.4 মনে আছে?)"],["おさきにしつれいします","osaki ni shitsurei shimasu","আগে যাচ্ছি (কাজ শেষে বেরোনোর কথা) ★"],["やすみ","yasumi","ছুটি"],["あしたやすんでもいいですか","ashita yasundemo ii desu ka","কাল ছুটি নিতে পারি? ★app verified"],["おくれます","okuremasu","দেরি হবে"],["でんしゃがおくれています","densha ga okurete imasu","ট্রেন দেরি করছে"],["かいぎ","kaigi","meeting"],["しごと","shigoto","কাজ"],["はたらきます","hatarakimasu","কাজ করি"],["はじめます / おわります","hajimemasu / owarimasu","শুরু করি / শেষ করি"],["きゅうけい","kyuukei","বিরতি / break"],["こまっています","komatte imasu","ঝামেলায় পড়েছি"],["すみません、たすけてください","sumimasen, tasukete kudasai","মাফ করবেন, সাহায্য করুন ★app verified"]]},{"t":"p","c":"★ おさきにしつれいします — আক্ষরিক: \"আপনার আগে চলে যাওয়ার বেয়াদবি করছি\"। জাপানি work culture এর জানালা এই এক বাক্য — অন্যরা তখনো কাজ করছে, তুমি আগে বেরোচ্ছ, তার সৌজন্য-স্বীকৃতি। উত্তরে আসবে: おつかれさまでした!"},{"t":"h","c":"🧩 Grammar core"},{"t":"p","c":"**১. ます-form — verb এর polite রূপ (জাপানি verb system এর প্রবেশদ্বার):**"},{"t":"table","rows":[["Present/future","অর্থ","Negative"],["はたらき**ます**","কাজ করি/করব","はたらき**ません** (করি না)"],["いき**ます**","যাই/যাব","いき**ません**"],["たべ**ます**","খাই/খাব","たべ**ません**"]]},{"t":"p","c":"লক্ষ করো — জাপানি verb এ **person নেই**: আমি/তুমি/সে সবার জন্য はたらきます। বাংলায় করি/করো/করেন মুখস্থ করতে হয় — জাপানি এখানে সহজ! আর present আর future একই form — \"কাল যাব\" = あした いきます।"},{"t":"p","c":"**২. Time particle に আর জায়গার で:**"},{"t":"q","c":"はちじ**に** はじめます。 — ৮টা**য়** শুরু। (に = নির্দিষ্ট সময়ে)"},{"t":"q","c":"こうじょう**で** はたらきます。 — কারখানা**য়/তে** কাজ করি। (で = যেখানে কাজটা ঘটে)"},{"t":"p","c":"দুটোই বাংলা \"-এ/-তে\" র ভাগ — সময় হলে に, কাজের জায়গা হলে で। প্রথমে গুলিয়ে যাবে, ঠিক আছে — mistake pattern এ practice আছে।"},{"t":"p","c":"**৩. ছুটি চাওয়ার polite formula (এখন chunk হিসেবে নাও):**"},{"t":"q","c":"あした やすんでもいいですか。 — কাল ছুটি নিলে কি ঠিক আছে?"},{"t":"q","c":"এর ভেতরের machinery (てもいいですか) Ch.11 তে খুলব। আজ পুরো বাক্যটা একটা শব্দের মতো মুখস্থ — কারণ কালকেই লাগতে পারে।"},{"t":"h","c":"💬 Dialogue — সকালের meeting এর আগে"},{"t":"q","c":"**তুমি:** おはようございます。"},{"t":"q","c":"**リーダー:** おはよう。きょうは ラインAです。はちじに はじめます。"},{"t":"q","c":"**তুমি:** はい、わかりました。"},{"t":"q","c":"*(বিকেলে—)*"},{"t":"q","c":"**তুমি:** リーダー、すみません。あした やすんでもいいですか。"},{"t":"q","c":"**リーダー:** どうしましたか。 *(কী হয়েছে?)*"},{"t":"q","c":"**তুমি:** びょういんに いきます。 *(হাসপাতালে যাব)*"},{"t":"q","c":"**リーダー:** そうですか。だいじょうぶですよ。おだいじに。 *(আচ্ছা। সমস্যা নেই। সুস্থ থেকো।)*"},{"t":"q","c":"**তুমি:** ありがとうございます。"},{"t":"q","c":"*(কাজ শেষে—)* **তুমি:** おさきに しつれいします。"},{"t":"q","c":"**みんな:** おつかれさまでした!"},{"t":"p","c":"わかりました — \"বুঝেছি/ঠিক আছে\" — কাজের জীবনের সবচেয়ে বেশি বলা শব্দ হবে এটা। ★app verified"},{"t":"h","c":"🗣️ উচ্চারণ trap"},{"t":"li","c":"しつれいします — \"শিৎসুরেই শিমাস্\" — つ এখানেও ৎসু, \"শিচুরেই\" না।"},{"t":"li","c":"おくれます (দেরি হব) vs おきます (উঠি) vs おくります (পাঠাই) — কাছাকাছি শোনায়, আলাদা করে কান practice করো।"},{"t":"h","c":"⚠️ ভুল যেখানে হয়"},{"t":"p","c":"1. দেরি হলে চুপচাপ ঢুকে পড়া — জাপানে এটা বড় অপরাধ। ফোন/LINE এ **আগে** জানাও: すみません、でんしゃが おくれています。১০ মিনিট দেরিও report করার মতো ঘটনা। 2. ছুটি \"নিচ্ছি\" ঘোষণা করা (やすみます!) — জিজ্ঞেস করো (やすんでもいいですか)। জাপানি workplace এ অনুমতির ভঙ্গিটাই সম্মান। 3. で/に অদলবদল: ×こうじょうに はたらきます — জায়গায় **action** হলে で।"},{"t":"h","c":"🏮 Culture corner — 報連相 (hou-ren-sou)"},{"t":"p","c":"জাপানি কাজের সংস্কৃতির তিন স্তম্ভ: 報告 (report — কাজ শেষে জানানো), 連絡 (contact — যেকোনো change জানানো), 相談 (consult — সমস্যায় আগে জিজ্ঞেস)। বাংলাদেশে \"নিজে সামলে নেওয়া\" গুণ; জাপানে **আগে জানানোই** গুণ। ভুল হলে লুকিয়ো না — সাথে সাথে বলো। এটা জানলে জাপানি boss এর প্রিয় হবে, না জানলে সবচেয়ে ভালো কাজ করেও ভুল বোঝাবুঝি।"},{"t":"h","c":"✍️ অনুশীলন"},{"t":"p","c":"**A:** Situation → বাক্য: (১) ট্রেন লেট, LINE এ কী লিখবে? (২) সবার আগে বেরোচ্ছ (৩) নতুন কাজ বুঝেছ **B:** ছুটি চাওয়ার mini-dialogue role-play (কারণ সহ)। **C:** に নাকি で? — はちじ( )おわります · しょくどう( )たべます · ラインA( )はたらきます *(উত্তর: Appendix J)*"},{"t":"h","c":"📦 SRS words"},{"t":"p","c":"おさきにしつれいします・やすみ・やすんでもいいですか・おくれます・かいぎ・しごと・はたらきます・はじめます・おわります・きゅうけい・わかりました・わかりません・こまっています・どうしましたか・おだいじに"},{"t":"h","c":"☑️ Self-check"},{"t":"li","c":"[ ] ছুটি চাওয়া ও দেরি জানানো — দুটোই ফোনে পারি"},{"t":"li","c":"[ ] ます/ません form বানাতে পারি"},{"t":"li","c":"[ ] 報連相 কী আর কেন, বুঝি"}]},{"id":"ch9","num":9,"title":"Clinic ও শরীর খারাপ","part":"PART 2 — Daily Life ও কাজের জাপানি (A2)","blocks":[{"t":"p","c":"`unit: A2.2 · level: A2 · আগে লাগবে: Ch.5 · app lessons: clinic_01, lesson_emergency`"},{"t":"h","c":"🎯 এই chapter শেষে"},{"t":"li","c":"ডাক্তারকে symptom বোঝাতে পারবে (কোথায় ব্যথা, কেমন লাগছে)"},{"t":"li","c":"Emergency তে সাহায্য চাইতে পারবে — 119/110 সহ"},{"t":"li","c":"Pharmacy তে ওষুধ কিনতে পারবে"},{"t":"h","c":"🎬 Scene"},{"t":"p","c":"রাত ২টা, dorm এ জ্বর ১০২°। জাপানি জানো না ভেবে হাসপাতালে না গিয়ে সকাল পর্যন্ত সহ্য করা — বিদেশি কর্মীদের সবচেয়ে common (আর সবচেয়ে বিপজ্জনক) ভুল। এই chapter টা জীবন বাঁচানোর chapter। মন দিয়ে।"},{"t":"h","c":"📖 শব্দ (app verified core)"},{"t":"table","rows":[["জাপানি","Romaji","বাংলা"],["あたまがいたいです","atama ga itai desu","মাথা ব্যথা করছে ★"],["おなかがいたいです","onaka ga itai desu","পেট ব্যথা করছে ★"],["ねつがあります","netsu ga arimasu","জ্বর আছে ★"],["びょういんにいきたいです","byouin ni ikitai desu","হাসপাতালে যেতে চাই ★"],["たすけてください","tasukete kudasai","সাহায্য করুন ★"],["きゅうきゅうしゃをよんでください","kyuukyuusha o yonde kudasai","Ambulance ডাকুন ★"],["けいさつをよんでください","keisatsu o yonde kudasai","পুলিশ ডাকুন ★"],["けがをしました","kega o shimashita","আঘাত পেয়েছি ★"],["じしんです","jishin desu","ভূমিকম্প! ★"],["くすり","kusuri","ওষুধ"],["びょうき","byouki","অসুখ"],["かぜをひきました","kaze o hikimashita","ঠান্ডা লেগেছে"],["せきがでます","seki ga demasu","কাশি হচ্ছে"],["はきけがします","hakike ga shimasu","বমি বমি লাগছে"],["アレルギーがあります","arerugii ga arimasu","Allergy আছে"]]},{"t":"p","c":"শরীরের অংশ: あたま (মাথা) · おなか (পেট) · て (হাত) · あし (পা) · め (চোখ) · は (দাঁত) · のど (গলা) · こし (কোমর) · せなか (পিঠ)"},{"t":"h","c":"🧩 Grammar core"},{"t":"p","c":"**১. Symptom এর মহা-formula:**"},{"t":"q","c":"[শরীরের অংশ] **が いたいです**。 — [অংশ] ব্যথা করছে।"},{"t":"q","c":"のどが いたいです。 (গলা ব্যথা) · こしが いたいです。 (কোমর ব্যথা — factory-শ্রমিকের national সমস্যা!)"},{"t":"p","c":"**২. が আছে-হচ্ছে বলতে:**"},{"t":"q","c":"ねつ**が** あります。 (জ্বর আছে) · せき**が** でます。 (কাশি বেরোচ্ছে)"},{"t":"p","c":"は আর が এর পুরো দর্শন পরে (Ch.16) — আপাতত: **নতুন তথ্য/symptom সামনে আনতে が।** ডাক্তারের ঘরে সব বাক্য が দিয়েই চলবে।"},{"t":"p","c":"**৩. 〜たいです — চাওয়া:**"},{"t":"q","c":"いき**たいです** (যেতে চাই) · やすみ**たいです** (ছুটি নিতে/বিশ্রাম চাই) · みず**が のみたいです** (পানি খেতে চাই)"},{"t":"p","c":"ます-form এর ます কেটে たいです। বাংলার \"-তে চাই\" — গঠনও প্রায় same জায়গায় বসে!"},{"t":"p","c":"**৪. いつから — কবে থেকে:** ডাক্তার জিজ্ঞেস করবেই: いつからですか。 উত্তর: きのうから (গতকাল থেকে) · けさから (আজ সকাল থেকে) · みっかまえから (তিন দিন আগে থেকে)।"},{"t":"h","c":"💬 Dialogue — clinic এর reception + ডাক্তার"},{"t":"q","c":"**うけつけ:** どうしましたか。"},{"t":"q","c":"**তুমি:** きのうから ねつが あります。あたまも いたいです。 *(কালকে থেকে জ্বর। মাথাও ব্যথা।)*"},{"t":"q","c":"**うけつけ:** ほけんしょうは ありますか。 *(insurance card আছে?)*"},{"t":"q","c":"**তুমি:** はい、これです。"},{"t":"q","c":"*(ডাক্তারের ঘরে)*"},{"t":"q","c":"**いしゃ:** のどを みせてください。…かぜですね。くすりを だします。"},{"t":"q","c":"**তুমি:** ありがとうございます。しごとは だいじょうぶですか。"},{"t":"q","c":"**いしゃ:** あしたは やすんでください。 *(কাল বিশ্রাম নিন।)*"},{"t":"p","c":"も = \"ও/এমনকি...ও\" — あたま**も** いたい = মাথা**ও** ব্যথা। は/が এর জায়গায় বসে যায়।"},{"t":"h","c":"🗣️ উচ্চারণ trap"},{"t":"li","c":"びょういん (হাসপাতাল) vs びよういん (beauty parlor)! ছোট ょ আর বড় よ — জ্বর নিয়ে beauty parlor এ পৌঁছে যেও না। びょ এক ঝটকায়: \"ব্যোːইন\"।"},{"t":"li","c":"ず in くすり নেই কিন্তু ঐ z-family মনে করিয়ে দিই: জাপানি ざ/ず/ぜ/ぞ হলো **z**, বাংলা \"জ\" (dʒ) না। かぜ = \"কাzে\" (কাজে না!)। জিভ দাঁতের পেছনে রেখে মৌমাছির মতো zzz — সেই sound। বাংলাদেশি learner দের #1 উচ্চারণ ভুল এটা।"},{"t":"h","c":"⚠️ ভুল যেখানে হয়"},{"t":"p","c":"1. ব্যথা বোঝাতে শুধু いたい!いたい! বলা — **কোথায়** সেটাই ডাক্তারের দরকার: [অংশ]+が+いたいです। 2. Insurance card (ほけんしょう) না নিয়ে যাওয়া — জাপানে ওটা ছাড়া bill ৩ গুণ। Wallet এ সবসময়। 3. 119 আর 110 গুলানো: **119 = ambulance/আগুন**, **110 = পুলিশ**। বাংলাদেশের 999 এর মতো এক নম্বর না — দুটো আলাদা।"},{"t":"h","c":"🏮 Culture corner"},{"t":"p","c":"জাপানের ওষুধের দোকান দুই রকম: 薬局 (yakkyoku — prescription এর) আর ドラッグストア (drugstore — সাধারণ ওষুধ+দৈনন্দিন জিনিস)। ডাক্তার দেখানোর আগে হালকা জ্বর-সর্দিতে drugstore এর かぜぐすり (ঠান্ডার ওষুধ) যথেষ্ট। আর হ্যাঁ — জাপানি ডাক্তাররা কম ওষুধ দেয়, \"এত কম ওষুধ!\" ভেবে অবাক হয়ো না।"},{"t":"h","c":"✍️ অনুশীলন"},{"t":"p","c":"**A:** বলো: (১) তিন দিন ধরে কাশি (২) দাঁত ব্যথা, dentist এ যেতে চাই (৩) ভাইয়ের জ্বর — ambulance! **B:** নিজের একটা কাল্পনিক অসুখের পুরো story সাজাও: কী হয়েছে + কবে থেকে + কী চাও। **C:** Emergency drill — মুখস্থ পরীক্ষা: ambulance ডাকার বাক্য, পুলিশ ডাকার বাক্য, \"ভূমিকম্প!\" — এক নিঃশ্বাসে। *(উত্তর: Appendix J)*"},{"t":"h","c":"📦 SRS words"},{"t":"p","c":"いたい・ねつ・びょういん・くすり・かぜ・せき・けが・きゅうきゅうしゃ・けいさつ・じしん・あたま・おなか・て・あし・のど・こし・〜たいです・いつから・きのうから・ほけんしょう・おだいじに・アレルギー"},{"t":"h","c":"☑️ Self-check"},{"t":"li","c":"[ ] Symptom + কবে থেকে + কী চাই — তিনটাই বলতে পারি"},{"t":"li","c":"[ ] 119/110 কোনটা কী, ঘুমের মধ্যেও বলতে পারি"},{"t":"li","c":"[ ] びょういん আর びよういん আলাদা বলতে পারি 😄"}]},{"id":"ch10","num":10,"title":"রাস্তা, ট্রেন, যাতায়াত","part":"PART 2 — Daily Life ও কাজের জাপানি (A2)","blocks":[{"t":"p","c":"`unit: A2.3 · level: A2 · আগে লাগবে: Ch.3 · app lessons: lesson_directions, lesson_transport`"},{"t":"h","c":"🎯 এই chapter শেষে"},{"t":"li","c":"রাস্তা জিজ্ঞেস করতে ও **উত্তরটা বুঝতে** পারবে (জিজ্ঞেস করা সোজা, বোঝা কঠিন!)"},{"t":"li","c":"ট্রেন/বাসে চড়া: টিকিট, platform, নামার স্টেশন"},{"t":"li","c":"IC card (Suica/Pasmo) এর জগৎ"},{"t":"h","c":"🎬 Scene"},{"t":"p","c":"টোকিওর Shinjuku station — দিনে ৩৫ লাখ মানুষ, ২০০+ exit। পৃথিবীর ব্যস্ততম স্টেশনে হারিয়ে যাওয়াটা দোষের না — জাপানিরাও হারায়। পার্থক্য: তারা জিজ্ঞেস করতে জানে।"},{"t":"h","c":"📖 শব্দ (app verified — দুই lesson এর পুরো set)"},{"t":"table","rows":[["জাপানি","Romaji","বাংলা"],["えきはどこですか","eki wa doko desu ka","স্টেশন কোথায়?"],["トイレはどこですか","toire wa doko desu ka","টয়লেট কোথায়?"],["まっすぐいってください","massugu itte kudasai","সোজা যান"],["みぎにまがってください","migi ni magatte kudasai","ডানে ঘুরুন"],["ひだりにまがってください","hidari ni magatte kudasai","বামে ঘুরুন"],["ちかくにコンビニはありますか","chikaku ni konbini wa arimasu ka","কাছে কনবিনি আছে?"],["あるいていけますか","aruite ikemasu ka","হেঁটে যাওয়া যায়?"],["きっぷはどこでかえますか","kippu wa doko de kaemasu ka","টিকিট কোথায় কিনব?"],["このでんしゃはとうきょうにいきますか","kono densha wa Toukyou ni ikimasu ka","এই ট্রেন কি টোকিও যায়?"],["つぎのえきはなんですか","tsugi no eki wa nan desu ka","পরের স্টেশন কী?"],["ここでおります","koko de orimasu","এখানে নামব"],["のりかえはどこですか","norikae wa doko desu ka","কোথায় বদলাব?"],["いくらかかりますか / なんぷんかかりますか","ikura/nanpun kakarimasu ka","কত টাকা/মিনিট লাগবে?"],["バスてい","basutei","বাস স্টপ"]]},{"t":"p","c":"দিক-শব্দ: みぎ (ডান) · ひだり (বাম) · まっすぐ (সোজা) · ちかく (কাছে) · となり (পাশে) · まえ (সামনে) · うしろ (পেছনে) · しんごう (signal/মোড়)"},{"t":"h","c":"🧩 Grammar core"},{"t":"p","c":"**১. あります / います — আছে (জিনিস vs প্রাণী):**"},{"t":"q","c":"コンビニが **あります**。 (কনবিনি আছে — জড়)"},{"t":"q","c":"ねこが **います**。 (বিড়াল আছে — সজীব)"},{"t":"p","c":"বাংলায় দুটোই \"আছে\" — জাপানি ভাগ করে: নড়েচড়ে-শ্বাস-নেয় = います, বাকি সব = あります। এটা নতুন concept, একটু সময় দাও।"},{"t":"p","c":"**২. [জায়গা] に [জিনিস] が あります:**"},{"t":"q","c":"えきの ちかく**に** ATMが あります。 — স্টেশনের কাছে ATM আছে।"},{"t":"p","c":"এই に = অবস্থানের \"-এ/তে\" (Ch.8 এর কাজ-ঘটার で র সাথে মেলাও: **থাকা = に, করা = で**)।"},{"t":"p","c":"**৩. Direction শোনার survival kit — উত্তরে এগুলোই আসবে:**"},{"t":"q","c":"まっすぐ いって、しんごうを みぎに まがって、ひだりに あります。"},{"t":"q","c":"(সোজা গিয়ে, signal এ ডানে ঘুরে, বাম পাশে।)"},{"t":"p","c":"いって/まがって — এই て-জোড়া-রূপ Ch.15 তে খুলব; এখন chunk: **いって = গিয়ে, まがって = ঘুরে**। শুনে চেনাটাই আজকের কাজ।"},{"t":"h","c":"💬 Dialogue — station এর মুখে"},{"t":"q","c":"**তুমি:** すみません、みなみぐちは どこですか。 *(south exit কোথায়?)*"},{"t":"q","c":"**えきいん:** あそこの かいだんを おりて、まっすぐです。 *(ওই সিঁড়ি নেমে, সোজা।)*"},{"t":"q","c":"**তুমি:** ありがとうございます。あ、すみません — この でんしゃは よこはまに いきますか。"},{"t":"q","c":"**えきいん:** いいえ、つぎの でんしゃです。 *(না, পরেরটা।)*"},{"t":"q","c":"**তুমি:** わかりました。ありがとうございます!"},{"t":"h","c":"🗣️ উচ্চারণ trap"},{"t":"li","c":"きっぷ — ছোট っ: \"কিপ্পু\"। きぷ বললে টিকিট পাবে না 😄"},{"t":"li","c":"とうきょう — দুটোই লম্বা: \"তোːক্যোː\"। \"টোকিও\" বলা মুখে থাকলে জাপানি কানে ঢুকবে না — とう...きょう টেনে বলো।"},{"t":"li","c":"ひだり/みぎ চাপের মুখে উল্টে যায় — নিজের হাত দেখে drill করো: ডান হাত তুলে みぎ! ×১০।"},{"t":"h","c":"⚠️ ভুল যেখানে হয়"},{"t":"p","c":"1. উত্তর না বুঝেও はい、はい বলে হাঁটা দেওয়া — হারাবে আরও। না বুঝলে: すみません、もういちど おねがいします (আরেকবার বলুন) ★app verified — লজ্জা শূন্য, উপকার অনন্ত। 2. Local vs Rapid: 各駅停車 (সব স্টেশনে থামে) আর 急行/快速 (express — ছোট স্টেশন skip)। ভুল ট্রেনে উঠলে তোমার স্টেশন পেরিয়ে যাবে — board এ রং আলাদা থাকে, station staff কে この でんしゃは [স্টেশন]に とまりますか জিজ্ঞেস করো। 3. শেষ ট্রেন (終電 shuuden) মিস — টোকিওতে রাত ~১২টা-১টার পরে ট্রেন **নেই**, taxi ভয়ানক দামি। রাতের প্ল্যানে しゅうでん মাথায় রাখো।"},{"t":"h","c":"🏮 Culture corner — IC card"},{"t":"p","c":"Suica/Pasmo card নাও প্রথম সপ্তাহেই (স্টেশনের মেশিনে, ৫০০円 deposit)। প্রতিবার টিকিট কেনার জাপানি বলা লাগবে না — টাচ করে ঢোকো-বেরোও, কনবিনিতেও চলে। মেশিনে চার্জ করা: チャージ button → টাকা ঢোকাও। ব্যস। (তবু きっぷ কেনা শিখে রাখো — ছোট শহরে IC চলে না অনেক জায়গায়।)"},{"t":"h","c":"✍️ অনুশীলন"},{"t":"p","c":"**A:** জিজ্ঞেস করো: (১) কাছে ATM (২) এই বাস কি station যায় (৩) কত মিনিট লাগবে **B:** শোনা-drill: まっすぐ いって、ふたつめの しんごうを ひだりに まがってください — বাংলায় বলো কী করতে বলল। (দুই নম্বর মোড়ে বামে!) **C:** নিজের বাসা থেকে কাজ পর্যন্ত রাস্তাটা জাপানিতে ৩ ধাপে বর্ণনা করো। *(উত্তর: Appendix J)*"},{"t":"h","c":"📦 SRS words"},{"t":"p","c":"えき・どこ・まっすぐ・みぎ・ひだり・まがって・いって・ちかく・あります・います・きっぷ・でんしゃ・つぎ・おります・のりかえ・かかります・バスてい・しんごう・もういちどおねがいします"},{"t":"h","c":"☑️ Self-check"},{"t":"li","c":"[ ] রাস্তা জিজ্ঞেস + উত্তরের মূল শব্দগুলো ধরতে পারি"},{"t":"li","c":"[ ] ঠিক ট্রেন কিনা confirm করতে পারি"},{"t":"li","c":"[ ] あります/います কখন কোনটা, জানি"}]},{"id":"ch11","num":11,"title":"অনুমতি আর অনুরোধ","part":"PART 2 — Daily Life ও কাজের জাপানি (A2)","blocks":[{"t":"p","c":"`unit: A2.4 · level: A2 · আগে লাগবে: Ch.8 · app lesson: lesson_work_requests`"},{"t":"h","c":"🎯 এই chapter শেষে"},{"t":"li","c":"〜てもいいですか দিয়ে অনুমতি চাইতে পারবে (জাপানি সমাজের master key)"},{"t":"li","c":"〜てください দিয়ে ভদ্রভাবে অনুরোধ করতে পারবে"},{"t":"li","c":"না-বলা অনুরোধ বুঝবে: 〜ないでください"},{"t":"h","c":"🎬 Scene"},{"t":"p","c":"নতুন কাজ, শেখার পাহাড়। জাপানে \"না জিজ্ঞেস করে করা\" র চেয়ে \"জিজ্ঞেস করে করা\" সবসময় নিরাপদ — even ছোট জিনিসে। এই দুটো pattern জানলে তুমি যেকোনো situation এ ভদ্র, নিরাপদ আর professional।"},{"t":"h","c":"📖 শব্দ (app verified core)"},{"t":"table","rows":[["জাপানি","Romaji","বাংলা"],["もういちどおねがいします","mou ichido onegai shimasu","আরেকবার বলুন"],["ゆっくりはなしてください","yukkuri hanashite kudasai","ধীরে বলুন"],["てつだってください","tetsudatte kudasai","একটু হাত লাগান/সাহায্য করুন"],["これでいいですか","kore de ii desu ka","এটা কি ঠিক আছে? ★ কাজ শেখার magic প্রশ্ন"],["しつもんがあります","shitsumon ga arimasu","একটা প্রশ্ন আছে"],["トイレにいってもいいですか","toire ni ittemo ii desu ka","টয়লেটে যেতে পারি?"],["しゃしんをとってもいいですか","shashin o tottemo ii desu ka","ছবি তুলতে পারি?"],["ここにすわってもいいですか","koko ni suwattemo ii desu ka","এখানে বসতে পারি?"],["ちょっとまってください","chotto matte kudasai","একটু অপেক্ষা করুন"],["みせてください","misete kudasai","দেখান"],["かいてください","kaite kudasai","লিখে দিন ★ না বুঝলে এটাই ত্রাতা"]]},{"t":"h","c":"🧩 Grammar core"},{"t":"p","c":"**১. অনুমতি: [て-রূপ] + もいいですか**"},{"t":"q","c":"すわって**もいいですか**。 — বসলে কি ঠিক আছে? → বসতে পারি?"},{"t":"p","c":"উত্তর: はい、どうぞ (হ্যাঁ, নিন/করুন) · すみません、ちょっと… (দুঃখিত, একটু...) ★ জাপানিরা সরাসরি \"না\" প্রায় বলে না — ちょっと… মানেই **না**। এটা ধরতে শেখা জাপান-জীবনের বড় skill।"},{"t":"p","c":"**২. অনুরোধ: [て-রূপ] + ください**"},{"t":"q","c":"ゆっくり はなして**ください**。 — ধীরে বলুন।"},{"t":"p","c":"ください চেনো Ch.6 থেকে (これをください) — জিনিসের বদলে かজ চাইলে verb এর て-রূপ + ください।"},{"t":"p","c":"**৩. নিষেধ-অনুরোধ: [ない-রূপ] + でください**"},{"t":"q","c":"ここに はいら**ないでください**。 — এখানে ঢুকবেন না। (work safety sign এর ভাষা — Ch.13 তে আরও)"},{"t":"p","c":"**て-রূপ এখনো \"বানাতে\" শিখছি না** — এই chapter এর সব বাক্য chunk হিসেবে নাও (いって, すわって, はなして, まって, みせて, かいて, てつだって)। বানানোর নিয়ম পুরোটা Ch.15 তে — তখন পেছন ফিরে দেখবে এগুলো সব নিয়ম মেনেই ছিল। (এভাবেই Irodori-ও শেখায় — আগে ব্যবহার, পরে ব্যাকরণ। বাচ্চারা যেভাবে ভাষা শেখে।)"},{"t":"h","c":"💬 Dialogue — নতুন মেশিনে প্রথম দিন"},{"t":"q","c":"**তুমি:** すみません、しつもんが あります。"},{"t":"q","c":"**せんぱい:** はい、なんですか。"},{"t":"q","c":"**তুমি:** これは どう つかいますか。ちょっと みせてください。 *(এটা কীভাবে চালায়? একটু দেখান।)*"},{"t":"q","c":"**せんぱい:** *(দেখালেন — দ্রুত জাপানিতে ব্যাখ্যা)*"},{"t":"q","c":"**তুমি:** すみません、ゆっくり はなしてください。"},{"t":"q","c":"**せんぱい:** *(ধীরে, আবার)*"},{"t":"q","c":"**তুমি:** わかりました。…これで いいですか。"},{"t":"q","c":"**せんぱい:** うん、いいですよ!じょうずですね。 *(হ্যাঁ, ঠিক! ভালো পারছ তো।)*"},{"t":"p","c":"এই dialogue টা আসলে একটা life-script: **প্রশ্ন করো → দেখতে চাও → ধীরে শুনো → করে দেখাও → confirm করো।** জাপানি সেন্পাইরা এই ভঙ্গি ভালোবাসে — শেখার আগ্রহ = সেরা impression।"},{"t":"h","c":"🗣️ উচ্চারণ trap"},{"t":"li","c":"ちょっと — \"চোত্তো\" (ছোট っ!)। ちょと বললে অন্যরকম শোনায়।"},{"t":"li","c":"まって (অপেক্ষা) vs また (আবার) vs まだ (এখনো) — তিন ভাই, তিন মানে। কান খাড়া।"},{"t":"h","c":"⚠️ ভুল যেখানে হয়"},{"t":"p","c":"1. ください র জায়গায় হুকুমের সুর — ください আছে বলেই ভদ্র; মুখ গম্ভীর + জোর গলা হলে জাপানি কানে rude। নরম tone অর্ধেক ভদ্রতা। 2. ちょっと… শুনেও চাপাচাপি করা — ওটা \"না\"। মেনে নিয়ে すみません বলে সরে আসো। 3. しつもんがあります না বলে সরাসরি প্রশ্ন ছুঁড়ে দেওয়া — ছোট্ট intro টা জাপানি ভদ্রতার দরজা খোলে।"},{"t":"h","c":"🏮 Culture corner"},{"t":"p","c":"জাপানে \"একটু\" (ちょっと) শব্দটা দিনে একশবার শুনবে — সময় চাইতে (ちょっとまって), না বলতে (ちょっと…), ডাকতে (ちょっと すみません)। শব্দটার আসল ক্ষমতা: যেকোনো কথাকে নরম করে দেওয়া। তোমার toolkit এ রাখো — বাংলার \"একটু\" যেমন: \"একটু দেখবেন ভাই?\""},{"t":"h","c":"✍️ অনুশীলন"},{"t":"p","c":"**A:** অনুমতি চাও: (১) জানালা খুলতে (あけます→あけて) (২) আগে যেতে (かえります→かえって) (৩) এই কলম ব্যবহার (つかいます→つかって) **B:** অনুরোধ করো: (১) আরেকবার দেখাতে (২) ধীরে বলতে (৩) লিখে দিতে **C:** Role-play: উপরের dialogue এর ৫-ধাপ script নিজের কাজের একটা জিনিস দিয়ে। *(উত্তর: Appendix J)*"},{"t":"h","c":"📦 SRS words"},{"t":"p","c":"〜てもいいですか・〜てください・〜ないでください・ちょっと・まってください・みせてください・かいてください・てつだってください・ゆっくり・しつもん・これでいいですか・どうぞ・じょうず"},{"t":"h","c":"☑️ Self-check"},{"t":"li","c":"[ ] অনুমতি আর অনুরোধ — দুটোর formula আলাদা করে জানি"},{"t":"li","c":"[ ] ちょっと… শুনলে বুঝি ওটা না"},{"t":"li","c":"[ ] কাজ শেখার ৫-ধাপ script টা মুখস্থ"}]},{"id":"ch12","num":12,"title":"অতীত আর ভবিষ্যতের কথা","part":"PART 2 — Daily Life ও কাজের জাপানি (A2)","blocks":[{"t":"p","c":"`unit: A2.5 · level: A2 · আগে লাগবে: Ch.11 · app lesson: lesson_smalltalk (অংশ)`"},{"t":"h","c":"🎯 এই chapter শেষে"},{"t":"li","c":"কাল/গত সপ্তাহে কী করেছ বলতে পারবে (ました)"},{"t":"li","c":"Weekend/ছুটির plan বলতে পারবে"},{"t":"li","c":"Small talk চালাতে পারবে — জাপানি সহকর্মীদের সাথে সম্পর্কের আসল সিঁড়ি"},{"t":"h","c":"🎬 Scene"},{"t":"p","c":"লাঞ্চ ব্রেক। সহকর্মী জিজ্ঞেস করল: しゅうまつは なにを しましたか。 (weekend এ কী করলে?) — \"はい\" বলে হাসা ছাড়া উত্তর ছিল না এতদিন। আজকের পরে থাকবে।"},{"t":"h","c":"📖 শব্দ (app verified + time words)"},{"t":"table","rows":[["জাপানি","Romaji","বাংলা"],["きょうはあついですね","kyou wa atsui desu ne","আজ গরম, তাই না? ★"],["きょうはさむいですね","kyou wa samui desu ne","আজ ঠান্ডা, না? ★"],["おげんきですか / げんきです","ogenki desu ka / genki desu","কেমন আছেন? / ভালো আছি ★"],["にほんごをべんきょうしています","nihongo o benkyou shite imasu","জাপানি শিখছি ★"],["しゅみはなんですか","shumi wa nan desu ka","শখ কী? ★"],["しゅうまつはなにをしますか","shuumatsu wa nani o shimasu ka","Weekend এ কী করবে? ★"],["きのう / きょう / あした","kinou / kyou / ashita","গতকাল / আজ / কাল"],["せんしゅう / こんしゅう / らいしゅう","senshuu / konshuu / raishuu","গত / এই / আগামী সপ্তাহ"],["いきました / たべました / みました","ikimashita / tabemashita / mimashita","গেলাম / খেলাম / দেখলাম"],["かいもの","kaimono","কেনাকাটা"],["えいが","eiga","সিনেমা"],["サッカー / クリケット","sakkaa / kuriketto","football /
